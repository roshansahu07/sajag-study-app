<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजग छात्र Ultimate</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
        const [showDueOnly, setShowDueOnly] = useState(false);
        const [isDarkMode, setIsDarkMode] = useState(true);
        const [studyLogs, setStudyLogs] = useState(() => {
          const saved = localStorage.getItem('user_study_logs');
          return saved ? JSON.parse(saved) : [
            {
              id: 1, subject: 'भौतिक विज्ञान (Physics)', topic: 'घर्षण और गति के नियम',
              stages: [
                { name: 'R1 (24h)', completed: false },
                { name: 'R2 (3d)', completed: false },
                { name: 'R3 (7d)', completed: false },
                { name: 'R4 (15d)', completed: false },
                { name: 'Mastery (30d)', completed: false }
              ]
            }
          ];
        });

        const markStageDone = (id) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === id) {
              const stages = log.stages.map(s => !s.completed ? { ...s, completed: true } : s);
              return { ...log, stages };
            }
            return log;
          }));
        };

        const resetCycle = (id) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === id) {
              const stages = log.stages.map(s => ({ ...s, completed: false }));
              return { ...log, stages };
            }
            return log;
          }));
        };

        useEffect(() => {
          localStorage.setItem('user_study_logs', JSON.stringify(studyLogs));
        }, [studyLogs]);

        useEffect(() => {
          document.body.className = isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900';
        }, [isDarkMode]);

        return (
          <div className="min-h-screen flex flex-col justify-between items-center p-3 w-full max-w-md mx-auto">
            <header className="w-full flex justify-between items-center py-2 px-1 border-b border-slate-800/40 mb-3">
              <div>
                <h1 className="text-xl font-black text-indigo-500">🧠 सजग छात्र</h1>
                <p class="text-[9px] text-slate-400">वैज्ञानिक 5-स्टेज रिवीजन ट्रैकर</p>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setIsDarkMode(!isDarkMode)} className="px-2.5 py-1 bg-indigo-600/10 border border-indigo-500/30 rounded-xl text-[10px] font-bold text-indigo-400">
                  {isDarkMode ? '☀️ Light' : '🌙 Dark'}
                </button>
                <a href="./features.html" className="bg-indigo-600 text-white font-bold px-3 py-1 rounded-xl text-[10px] flex items-center">⏱️ टूल्स केंद्र</a>
              </div>
            </header>

            <div className={`w-full flex flex-col flex-1 rounded-[24px] border shadow-2xl relative overflow-hidden mb-6 p-4 min-h-[65vh] ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
              <div className="flex items-center gap-2 text-xs font-bold text-slate-400 mb-4">
                <input type="checkbox" id="dueFilter" checked={showDueOnly} onChange={() => setShowDueOnly(!showDueOnly)} className="w-4 h-4 accent-indigo-600 cursor-pointer" />
                <label htmlFor="dueFilter" className="cursor-pointer select-none">केवल आज का आवश्यक रिवीजन दिखाएं</label>
              </div>

              <div className="space-y-3 flex-1 overflow-y-auto">
                {studyLogs.map(log => (
                  <div key={log.id} className={`p-3.5 rounded-xl border space-y-3 shadow-sm ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-100 border-slate-200'}`}>
                    <div>
                      <span className="text-[8px] bg-indigo-500/10 text-indigo-400 px-1.5 py-0.5 rounded font-bold uppercase tracking-wide">{log.subject}</span>
                      <h4 className={`text-xs font-bold mt-1.5 ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{log.topic}</h4>
                    </div>

                    <div className="grid grid-cols-5 gap-1">
                      {log.stages.map((stage, idx) => (
                        <div key={idx} className={`text-[8px] py-1 rounded border text-center font-bold ${stage.completed ? 'bg-emerald-500/10 border-emerald-500/40 text-emerald-500' : (isDarkMode ? 'bg-slate-800 border-slate-700 text-slate-500' : 'bg-white border-slate-300 text-slate-400')}`}>
                          {stage.name}
                        </div>
                      ))}
                    </div>

                    <div className="flex gap-2 pt-2 border-t border-slate-800/20">
                      <button onClick={() => markStageDone(log.id)} className="flex-1 bg-emerald-600 text-white text-[10px] py-1.5 rounded-lg font-bold shadow-md">
                        ✅ स्टेज पूर्ण
                      </button>
                      <button onClick={() => resetCycle(log.id)} className={`flex-1 text-[10px] py-1.5 rounded-lg font-bold border ${isDarkMode ? 'bg-slate-800 text-slate-400 border-slate-700' : 'bg-white text-slate-600 border-slate-300'}`}>
                        🔄 रीसेट चक्र
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <footer className="w-full text-center py-1 text-[9px] text-slate-500">app.pmevidya.com</footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
