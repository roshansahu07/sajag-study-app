<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजग छात्र Ultimate v2.5</title>
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
      .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-spin-slow { animation: spin 8s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      
      /* स्क्रोलबार स्टाइलिंग */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 999px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <!-- React, ReactDOM, Babel और Lucide Icons के आवश्यक CDN पैकेजेस -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React Logic Script -->
    <script type="text/babel">
      const useState = React.useState;
      const useEffect = React.useEffect;

      // CDN पर Lucide Icons को सुरक्षित रूप से रेंडर करने का कंपोनेंट
      function Icon({ name, className = "w-4 h-4" }) {
        useEffect(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        });
        return <i data-lucide={name} className={className}></i>;
      }

      function App() {
        // --- 1. लोकल स्टोरेज से डेटा इनिशियलाइजेशन (डेटा परसिस्टेंस सुधार) ---
        const [user, setUser] = useState(() => {
          const localUser = localStorage.getItem('sajag_user');
          return localUser ? JSON.parse(localUser) : {
            name: 'रोशन लाल साहू',
            category: 'प्रतियोगी परीक्षा (Competitive Exams)',
            availableHours: 6,
            streak: 5, 
            points: 350
          };
        });

        const [studyLogs, setStudyLogs] = useState(() => {
          const localLogs = localStorage.getItem('sajag_logs');
          return localLogs ? JSON.parse(localLogs) : [
            {
              id: 1,
              subject: 'भौतिक विज्ञान (Physics)',
              topic: 'घर्षण और गति के नियम (Friction & Laws of Motion)',
              date: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString().split('T')[0], 
              difficulty: 'कठिन (Hard)',
              timeSpent: 2,
              currentStage: 1, 
              stages: [
                { name: 'R1 (24h)', due: new Date(Date.now()).toISOString().split('T')[0], completed: false },
                { name: 'R2 (3d)', due: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
                { name: 'R3 (7d)', due: new Date(Date.now() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
                { name: 'Test (15d)', due: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false }
              ]
            }
          ];
        });

        // प्रोफाइल एडिट करने के लिए फॉर्म स्टेट
        const [profileForm, setProfileForm] = useState({
          name: user.name,
          availableHours: user.availableHours,
          category: user.category
        });

        const [newLog, setNewLog] = useState({
          subject: '', customSubject: '', topic: '', difficulty: 'मध्यम (Medium)', timeSpent: 2
        });

        const [timer, setTimer] = useState({
          minutes: 25, seconds: 0, isActive: false, mode: 'Focus' 
        });

        const [activeTab, setActiveTab] = useState('dashboard');
        const [alertMsg, setAlertMsg] = useState(null);
        const [selectedTopicForTest, setSelectedTopicForTest] = useState(null);
        const [aiQuiz, setAiQuiz] = useState(null);
        const [loadingQuiz, setLoadingQuiz] = useState(false);
        const [userAnswers, setUserAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [notifications, setNotifications] = useState([]);

        const showAlert = (msg) => {
          setAlertMsg(msg);
          setTimeout(() => setAlertMsg(null), 4000);
        };

        // --- 2. ऑटो-सेव इंजन (जब भी स्टेट बदलेगी, डेटा सेव होगा) ---
        useEffect(() => {
          localStorage.setItem('sajag_user', JSON.stringify(user));
        }, [user]);

        useEffect(() => {
          localStorage.setItem('sajag_logs', JSON.stringify(studyLogs));
        }, [studyLogs]);

        // बाहरी बदलाव होने पर प्रोफाइल फॉर्म सिंक रखना
        useEffect(() => {
          setProfileForm({
            name: user.name,
            availableHours: user.availableHours,
            category: user.category
          });
        }, [user.name, user.availableHours, user.category]);

        // --- 3. स्मार्ट सुझाव विश्लेषक ---
        useEffect(() => {
          const todayStr = new Date().toISOString().split('T')[0];
          const generatedAlerts = [];

          studyLogs.forEach(log => {
            const activeStage = log.stages.find(s => !s.completed);
            if (activeStage && activeStage.due === todayStr) {
              generatedAlerts.push({
                id: `alert-${log.id}`,
                title: `स्मार्ट रिवीजन अलर्ट: ${log.subject} 💡`,
                text: `आपने पहले "${log.topic}" पढ़ा था। आज वैज्ञानिक अंतराल के अनुसार "${activeStage.name}" का समय है। स्मरण शक्ति बनाए रखने के लिए अभ्यास टेस्ट लें!`,
                type: 'urgent',
                actionTopic: log
              });
            }
          });

          if (studyLogs.length > 0) {
            const subjectsCount = studyLogs.reduce((acc, curr) => {
              acc[curr.subject] = (acc[curr.subject] || 0) + 1;
              return acc;
            }, {});
            if (Object.keys(subjectsCount).length < 2 && studyLogs.length >= 3) {
              generatedAlerts.push({
                id: 'balance-tip',
                title: 'विषय संतुलन चेतावनी ⚖️',
                text: 'आप केवल एक ही विषय पर अधिक ध्यान दे रहे हैं। अन्य विषयों का संतुलन बनाए रखने के लिए आज नया विषय शुरू करें।',
                type: 'tip'
              });
            }
          }

          generatedAlerts.push({
            id: 'focus-tip-1',
            title: 'एकाग्रता सुधार गाइड ⚡',
            text: 'लगातार 45 मिनट से अधिक न पढ़ें। फोकस टाइमर टैब में जाकर 25 मिनट का एक सेशन अभी चालू करें!',
            type: 'tip'
          });

          setNotifications(generatedAlerts);
        }, [studyLogs]);

        // --- 4. एआई मॉक टेस्ट जेनरेटर ---
        const handleGenerateQuiz = async (log) => {
          setSelectedTopicForTest(log);
          setAiQuiz(null);
          setUserAnswers({});
          setQuizSubmitted(false);
          setLoadingQuiz(true);
          setActiveTab('test-arena');

          setTimeout(() => {
            const simulatedQuestions = [
              {
                question: `निम्न में से कौन सा विकल्प "${log.topic}" संकल्पना के संदर्भ में सबसे महत्वपूर्ण पहलू को दर्शाता है?`,
                options: ["सैद्धांतिक अनुप्रयोग और नियम", "दैनिक जीवन के व्यावहारिक अनुभव", "गणितीय समीकरणों का विश्लेषण", "उपरोक्त सभी आयाम"],
                correctIndex: 3,
                explanation: "यह अवधारणा सैद्धांतिक, व्यावहारिक और गणितीय तीनों पहलुओं को संतुलित तरीके से समझाने में सक्षम है।"
              },
              {
                question: `यदि हम "${log.subject}" में इस टॉपिक की गहराई को समझें, तो इसके मुख्य प्रभाव का क्या कारण है?`,
                options: ["ऊर्जा का ह्रास होना", "प्रतिक्रिया बल में वृद्धि होना", "प्रकृति के बुनियादी नियमों का पालन", "अस्थिर संतुलन"],
                correctIndex: 2,
                explanation: "प्रकृति के बुनियादी नियमों के संतुलन के कारण ही इस प्रक्रिया को पूर्ण रूप से समझा जा सकता है।"
              },
              {
                question: `इस विषय में याद रखने की क्षमता (Memory Retention) बढ़ाने का सबसे बेहतर वैज्ञानिक तरीका क्या है?`,
                options: ["सिर्फ एक बार ध्यान से पढ़ना", "नियमित स्पैस्ड रिपीटीशन और सक्रिय टेस्ट देना", "लगातार 5 घंटे तक नोट्स बनाना", "परीक्षा के ठीक एक दिन पहले रटना"],
                correctIndex: 1,
                explanation: "वैज्ञानिक शोधों के अनुसार, सक्रिय रिकॉल (Active Recall) और स्पैस्ड रिपीटीशन ही लंबे समय तक याद रखने का सर्वोत्तम साधन हैं।"
              }
            ];
            setAiQuiz(simulatedQuestions);
            setLoadingQuiz(false);
          }, 1500);
        };

        const handleSubmitQuiz = () => {
          setQuizSubmitted(true);
          let correctCount = 0;
          aiQuiz.forEach((q, idx) => {
            if (userAnswers[idx] === q.correctIndex) correctCount++;
          });

          const pointsWon = correctCount * 20;
          setUser(prev => ({ 
            ...prev, 
            points: prev.points + pointsWon,
            streak: prev.streak + 1 
          }));

          showAlert(`🎉 टेस्ट समाप्त! स्कोर: ${correctCount}/3. आपको मिले +${pointsWon} XP!`);
          
          if (correctCount >= 2 && selectedTopicForTest) {
            promoteRevisionStage(selectedTopicForTest.id);
          }
        };

        const promoteRevisionStage = (logId) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const nextStage = log.currentStage + 1;
              const updatedStages = log.stages.map((stage, sIdx) => {
                if (sIdx === log.currentStage - 1) return { ...stage, completed: true };
                return stage;
              });
              return {
                ...log,
                currentStage: nextStage > 4 ? 4 : nextStage,
                stages: updatedStages
              };
            }
            return log;
          }));
        };

        const handleMarkStageCompleted = (logId, stageIndex) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const updatedStages = [...log.stages];
              updatedStages[stageIndex].completed = true;
              const nextStage = stageIndex + 2;
              return {
                ...log,
                currentStage: nextStage > 4 ? 4 : nextStage,
                stages: updatedStages
              };
            }
            return log;
          }));
          setUser(prev => ({ ...prev, points: prev.points + 15 }));
          showAlert('✅ रिवीजन记录 दर्ज हो गया! +15 XP पॉइंट्स।');
        };

        const todayTotalAllocated = studyLogs.reduce((acc, log) => acc + (parseFloat(log.timeSpent) || 0), 0);
        const remainingTime = Math.max(0, user.availableHours - todayTotalAllocated);

        // नया डेटा जोड़ने का हैंडलर (पुराने और नए डेटा को मिक्स करने का सुधार)
        const handleAddLog = (e) => {
          e.preventDefault();
          const finalSubject = newLog.subject === 'अन्य (Custom)' ? newLog.customSubject : newLog.subject;

          if (!finalSubject || !newLog.topic) {
            showAlert('⚠️ कृपया विषय और मुख्य टॉपिक का नाम दर्ज करें!');
            return;
          }

          const todayStr = new Date().toISOString().split('T')[0];
          let d1 = new Date(); d1.setDate(d1.getDate() + 1);
          let d2 = new Date(); d2.setDate(d2.getDate() + 3);
          let d3 = new Date(); d3.setDate(d3.getDate() + 7);
          let d4 = new Date(); d4.setDate(d4.getDate() + 15);

          const newEntry = {
            id: Date.now(),
            subject: finalSubject,
            topic: newLog.topic,
            date: todayStr,
            difficulty: newLog.difficulty,
            timeSpent: parseFloat(newLog.timeSpent) || 1,
            currentStage: 1,
            stages: [
              { name: 'R1 (24h)', due: d1.toISOString().split('T')[0], completed: false },
              { name: 'R2 (3d)', due: d2.toISOString().split('T')[0], completed: false },
              { name: 'R3 (7d)', due: d3.toISOString().split('T')[0], completed: false },
              { name: 'Test (15d)', due: d4.toISOString().split('T')[0], completed: false }
            ]
          };

          setStudyLogs([newEntry, ...studyLogs]);
          setUser(prev => ({ ...prev, points: prev.points + 50 }));
          showAlert('🚀 शानदार! पढ़ाई का ब्यौरा दर्ज हो गया। +50 XP!');
          setNewLog({ subject: '', customSubject: '', topic: '', difficulty: 'मध्यम (Medium)', timeSpent: 2 });
          setActiveTab('dashboard');
        };

        // प्रोफाइल क्रिएशन और अपडेट हैंडलर
        const handleUpdateProfile = (e) => {
          e.preventDefault();
          if (!profileForm.name.trim()) {
            showAlert('⚠️ कृपया एक वैध नाम दर्ज करें!');
            return;
          }
          setUser(prev => ({
            ...prev,
            name: profileForm.name,
            availableHours: parseInt(profileForm.availableHours) || 6,
            category: profileForm.category
          }));
          showAlert('👤 प्रोफाइल डेटा सफलतापूर्वक सुरक्षित हो गया!');
          setActiveTab('dashboard');
        };

        useEffect(() => {
          let interval = null;
          if (timer.isActive) {
            interval = setInterval(() => {
              if (timer.seconds > 0) {
                setTimer(prev => ({ ...prev, seconds: prev.seconds - 1 }));
              } else if (timer.seconds === 0 && timer.minutes > 0) {
                setTimer(prev => ({ ...prev, minutes: prev.minutes - 1, seconds: 59 }));
              } else {
                clearInterval(interval);
                const nextMode = timer.mode === 'Focus' ? 'Break' : 'Focus';
                setTimer({ minutes: nextMode === 'Focus' ? 25 : 5, seconds: 0, isActive: false, mode: nextMode });
                showAlert(`🔔 फोकस सत्र समाप्त!`);
              }
            }, 1000);
          } else {
            clearInterval(interval);
          }
          return () => clearInterval(interval);
        }, [timer.isActive, timer.seconds, timer.minutes]);

        return (
          <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col justify-between items-center p-2 sm:p-4 w-full">
            <header className="w-full max-w-md text-center py-2">
              <h1 className="text-xl sm:text-2xl font-black text-indigo-400 flex items-center justify-center gap-2">
                <Icon name="brain" className="w-6 h-6 text-indigo-500 animate-pulse" />
                <span>सजग छात्र</span>
                <span className="bg-gradient-to-r from-indigo-600 to-purple-600 text-[9px] text-white px-2 py-0.5 rounded-full font-bold">ULTIMATE v2.5</span>
              </h1>
              <p className="text-[10px] text-slate-400 mt-1">वैज्ञानिक 4-स्टेज रिवीजन ट्रैकर व फोकस टाइमर</p>
            </header>

            <div className="w-full max-w-md bg-slate-900 rounded-[32px] border-4 border-slate-800 shadow-2xl relative flex flex-col overflow-hidden h-[84vh] max-h-[790px]">
              
              {/* फोन नॉच */}
              <div className="absolute top-0 left-1/2 transform -translate-x-1/2 h-4 w-32 bg-slate-800 rounded-b-xl z-20 flex justify-center items-center">
                <div className="w-2.5 h-2.5 rounded-full bg-slate-950 mr-2"></div>
                <div className="w-10 h-1 rounded-full bg-slate-950"></div>
              </div>

              {alertMsg && (
                <div className="absolute top-8 left-4 right-4 bg-indigo-600 text-white p-3.5 rounded-xl shadow-xl z-50 text-xs flex items-center gap-2 border border-indigo-400 animate-fadeIn">
                  <Icon name="info" className="w-4 h-4 flex-shrink-0" />
                  <span className="font-medium">{alertMsg}</span>
                </div>
              )}

              <div className="bg-slate-950 text-[10px] px-6 pt-5 pb-2 text-slate-400 flex justify-between items-center border-b border-slate-800/40">
                <div>📱 app.pmevidya.com</div>
                <div className="flex items-center gap-1.5 font-semibold text-slate-300">
                  <span className="bg-indigo-900/40 border border-indigo-700/50 text-[9px] px-1.5 py-0.5 rounded text-indigo-300">🔥 {user.streak} दिन</span>
                  <span>⭐ {user.points} XP</span>
                </div>
              </div>

              <main className="flex-1 overflow-y-auto p-4 pb-16">
                {activeTab === 'dashboard' && (
                  <div className="space-y-4">
                    <div className="bg-gradient-to-br from-slate-900 to-indigo-950 p-4 rounded-2xl border border-indigo-900/40 space-y-3">
                      <div className="flex justify-between items-start">
                        <div>
                          <h2 className="text-xs text-indigo-300 font-bold uppercase tracking-wide">दैनिक अध्ययन समय बजट</h2>
                          <h3 className="text-lg font-black text-white mt-1">{todayTotalAllocated} / {user.availableHours} घंटे book हैं</h3>
                        </div>
                        <span className="bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] py-1 px-2 rounded-lg font-bold">
                          {remainingTime > 0 ? `${remainingTime}h उपलब्ध` : 'पूर्ण!'}
                        </span>
                      </div>
                      <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div className="bg-indigo-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (todayTotalAllocated / user.availableHours) * 100)}%` }}></div>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 flex items-center gap-1.5">
                        <Icon name="calendar" className="text-emerald-400" />
                        <span>📅 सक्रिय मेमोरी ट्रैकर</span>
                      </h3>
                      {studyLogs.length === 0 ? (
                        <p className="text-xs text-slate-500 text-center py-6 italic">कोई रिकॉर्ड नहीं मिला। 'दर्ज करें' टैब में जाएँ।</p>
                      ) : (
                        studyLogs.map(log => (
                          <div key={log.id} className="bg-slate-950 p-3.5 rounded-xl border border-slate-800/80 space-y-2">
                            <div className="flex justify-between items-start">
                              <div>
                                <span className="text-[9px] bg-indigo-950 border border-indigo-800 text-indigo-300 px-1.5 py-0.5 rounded font-bold uppercase">{log.subject}</span>
                                <h4 className="text-xs font-bold text-white mt-1">{log.topic}</h4>
                              </div>
                              <button 
                                onClick={() => handleGenerateQuiz(log)}
                                className="bg-slate-900 border border-indigo-500/40 text-indigo-400 p-1 rounded-lg text-[9px] font-bold flex items-center gap-1"
                              >
                                <Icon name="brain" className="w-3 h-3" />
                                <span>AI टेस्ट</span>
                              </button>
                            </div>
                            <div className="grid grid-cols-4 gap-1.5 mt-2">
                              {log.stages.map((stage, idx) => (
                                <button
                                  key={idx}
                                  disabled={stage.completed || (idx !== log.currentStage - 1)}
                                  onClick={() => handleMarkStageCompleted(log.id, idx)}
                                  className={`text-[9px] p-1.5 rounded border text-center transition ${stage.completed ? 'bg-emerald-950 border-emerald-500 text-emerald-400' : (idx === log.currentStage - 1 ? 'bg-indigo-950 border-indigo-500 text-indigo-300 font-bold' : 'bg-slate-800 border-slate-700 text-slate-400')}`}
                                >
                                  <span>{stage.name}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}

                {activeTab === 'log' && (
                  <form onSubmit={handleAddLog} className="space-y-4 text-xs">
                    <div>
                      <label className="block text-slate-300 font-semibold mb-1">विषय (Subject):</label>
                      <select value={newLog.subject} onChange={(e) => setNewLog({ ...newLog, subject: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200">
                        <option value="">-- चुनें --</option>
                        <option value="भौतिक विज्ञान (Physics)">भौतिक विज्ञान (Physics)</option>
                        <option value="रसायन विज्ञान (Chemistry)">रसायन विज्ञान (Chemistry)</option>
                        <option value="गणित (Maths)">गणित (Maths)</option>
                        <option value="इतिहास (History)">इतिहास (History)</option>
                        <option value="अन्य (Custom)">अन्य</option>
                      </select>
                    </div>
                    {newLog.subject === 'अन्य (Custom)' && (
                      <input type="text" placeholder="विषय नाम" value={newLog.customSubject} onChange={(e) => setNewLog({ ...newLog, customSubject: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200" />
                    )}
                    <div>
                      <label className="block text-slate-300 font-semibold mb-1">टॉपिक:</label>
                      <input type="text" placeholder="टॉपिक का नाम" value={newLog.topic} onChange={(e) => setNewLog({ ...newLog, topic: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200" />
                    </div>
                    <div>
                      <label className="block text-slate-300 font-semibold mb-1">पढ़ाई का समय (घंटे):</label>
                      <input type="number" step="0.5" min="0.5" max="12" value={newLog.timeSpent} onChange={(e) => setNewLog({ ...newLog, timeSpent: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200" />
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 font-bold py-3 rounded-xl shadow-lg text-white text-xs">🚀 सुरक्षित करें</button>
                  </form>
                )}

                {activeTab === 'test-arena' && (
                  <div className="space-y-4">
                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800/60 text-center">
                      <span className="text-[9px] bg-indigo-900 text-indigo-300 px-2 py-0.5 rounded font-black uppercase">{selectedTopicForTest?.subject}</span>
                      <h3 className="text-sm font-bold text-white mt-1.5">{selectedTopicForTest?.topic}</h3>
                    </div>

                    {loadingQuiz ? (
                      <div className="flex flex-col items-center justify-center py-12 space-y-3">
                        <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-xs text-slate-400">AI अभ्यास टेस्ट तैयार कर रहा है...</p>
                      </div>
                    ) : aiQuiz ? (
                      <div className="space-y-4 text-xs">
                        {aiQuiz.map((q, qIdx) => (
                          <div key={qIdx} className="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-3">
                            <h4 className="font-bold text-slate-200">प्रश्न {qIdx + 1}: {q.question}</h4>
                            <div className="space-y-2">
                              {q.options.map((opt, oIdx) => {
                                let optClass = "border-slate-800 text-slate-300";
                                if (userAnswers[qIdx] === oIdx) optClass = "border-indigo-500 bg-indigo-950/20 text-indigo-300";
                                if (quizSubmitted) {
                                  if (oIdx === q.correctIndex) optClass = "border-emerald-500 bg-emerald-950/30 text-emerald-400 font-bold";
                                  else if (userAnswers[qIdx] === oIdx) optClass = "border-rose-500 bg-rose-950/30 text-rose-400";
                                }
                                return (
                                  <button key={oIdx} type="button" disabled={quizSubmitted} onClick={() => setUserAnswers({ ...userAnswers, [qIdx]: oIdx })} className={`w-full text-left p-2 rounded-xl border text-[11px] transition ${optClass}`}>
                                    {oIdx + 1}. {opt}
                                  </button>
                                );
                              })}
                            </div>
                            {quizSubmitted && (
                              <div className="bg-slate-900 p-2.5 rounded text-[10px] text-slate-400 border border-slate-800">
                                <strong className="text-indigo-400">व्याख्या: </strong>{q.explanation}
                              </div>
                            )}
                          </div>
                        ))}
                        {!quizSubmitted ? (
                          <button onClick={handleSubmitQuiz} disabled={Object.keys(userAnswers).length < aiQuiz.length} className="w-full bg-emerald-600 disabled:opacity-40 font-bold py-3 rounded-xl text-white">टेस्ट सबमिट करें</button>
                        ) : (
                          <button onClick={() => setActiveTab('dashboard')} className="w-full bg-slate-800 font-bold py-3 rounded-xl text-slate-200">डैशबोर्ड पर जाएँ</button>
                        )}
                      </div>
                    ) : null}
                  </div>
                )}

                {activeTab === 'timer' && (
                  <div className="space-y-6 flex flex-col items-center justify-center min-h-[350px]">
                    <div className="relative w-40 h-40 rounded-full border-4 border-indigo-500/20 flex flex-col items-center justify-center bg-slate-900">
                      <span className="text-[10px] font-bold text-indigo-300 uppercase">{timer.mode}</span>
                      <span className="text-3xl font-black text-white my-1 font-mono">{String(timer.minutes).padStart(2, '0')}:{String(timer.seconds).padStart(2, '0')}</span>
                    </div>
                    <div className="flex gap-3">
                      <button type="button" onClick={() => setTimer(prev => ({ ...prev, isActive: !prev.isActive }))} className={`px-6 py-2 rounded-full font-bold text-white text-xs ${timer.isActive ? 'bg-amber-600' : 'bg-emerald-600'}`}>
                        {timer.isActive ? '⏸ रोकें' : '▶ शुरू करें'}
                      </button>
                      <button type="button" onClick={() => setTimer({ minutes: timer.mode === 'Focus' ? 25 : 5, seconds: 0, isActive: false, mode: timer.mode })} className="bg-slate-800 border border-slate-700 text-slate-300 px-5 py-2 rounded-full text-xs">🔄 रीसेट</button>
                    </div>
                  </div>
                )}

                {activeTab === 'notifications' && (
                  <div className="space-y-3 text-xs">
                    {notifications.map((notif, idx) => (
                      <div key={idx} className={`p-3 border rounded-xl ${notif.type === 'urgent' ? 'bg-rose-950/20 border-rose-900/40 text-rose-300' : 'bg-indigo-950/25 border-indigo-900/40 text-indigo-300'}`}>
                        <h4 className="font-bold text-white mb-0.5">{notif.title}</h4>
                        <p className="text-[11px] text-slate-300 mb-2">{notif.text}</p>
                        {notif.actionTopic && (
                          <button onClick={() => handleGenerateQuiz(notif.actionTopic)} className="bg-indigo-600 text-white px-2.5 py-1 rounded text-[10px] font-bold flex items-center gap-1">
                            <Icon name="brain" className="w-3 h-3" />
                            <span>अभी टेस्ट लें</span>
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === 'profile' && (
                  <form onSubmit={handleUpdateProfile} className="space-y-4 text-xs">
                    <div className="text-center py-2">
                      <div className="w-16 h-16 rounded-full bg-indigo-500/10 border-2 border-indigo-500 flex items-center justify-center mx-auto mt-2 text-xl">👤</div>
                      <h3 className="text-sm font-bold text-white mt-2">{user.name}</h3>
                      <p className="text-[10px] text-slate-400">{user.category}</p>
                    </div>

                    <div className="bg-slate-950 rounded-xl p-4 border border-slate-800/60 space-y-3">
                      <h4 className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider">विद्यार्थी प्रोफाइल विन्यास</h4>
                      
                      <div>
                        <label className="block text-slate-400 mb-1">आपका नाम:</label>
                        <input 
                          type="text" 
                          value={profileForm.name}
                          onChange={(e) => setProfileForm({ ...profileForm, name: e.target.value })}
                          className="w-full bg-slate-900 border border-slate-800 rounded-xl p-2 text-slate-200 focus:outline-none focus:border-indigo-500"
                        />
                      </div>

                      <div>
                        <label className="block text-slate-400 mb-1">दैनिक उपलब्ध घंटे लक्ष्य:</label>
                        <input 
                          type="number" 
                          min="1" 
                          max="24"
                          value={profileForm.availableHours}
                          onChange={(e) => setProfileForm({ ...profileForm, availableHours: e.target.value })}
                          className="w-full bg-slate-900 border border-slate-800 rounded-xl p-2 text-slate-200 focus:outline-none focus:border-indigo-500"
                        />
                      </div>

                      <div>
                        <label className="block text-slate-400 mb-1">तैयारी श्रेणी (Category):</label>
                        <select 
                          value={profileForm.category} 
                          onChange={(e) => setProfileForm({ ...profileForm, category: e.target.value })}
                          className="w-full bg-slate-900 border border-slate-800 rounded-xl p-2 text-slate-200 focus:outline-none focus:border-indigo-500"
                        >
                          <option value="प्रतियोगी परीक्षा (Competitive Exams)">प्रतियोगी परीक्षा (Competitive Exams)</option>
                          <option value="स्कूली शिक्षा (School Education)">स्कूली शिक्षा (School Education)</option>
                          <option value="उच्च शिक्षा (Higher Studies)">उच्च शिक्षा (Higher Studies)</option>
                        </select>
                      </div>
                    </div>

                    <button type="submit" className="w-full bg-indigo-600 font-bold py-3 rounded-xl shadow-lg text-white text-xs transition hover:bg-indigo-700">
                      💾 प्रोफाइल डेटा सुरक्षित करें
                    </button>
                  </form>
                )}
              </main>

              <nav className="absolute bottom-0 left-0 right-0 h-14 bg-slate-950 border-t border-slate-800 flex justify-around items-center px-1 z-20">
                <button type="button" onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'dashboard' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="book-open" /><span className="text-[8px] mt-0.5">ट्रैकर</span></button>
                <button type="button" onClick={() => setActiveTab('log')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'log' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="plus-circle" /><span className="text-[8px] mt-0.5">दर्ज करें</span></button>
                <button type="button" onClick={() => setActiveTab('timer')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'timer' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="clock" /><span className="text-[8px] mt-0.5">फोकस</span></button>
                <button type="button" onClick={() => setActiveTab('notifications')} className={`flex flex-col items-center justify-center flex-1 py-1 relative ${activeTab === 'notifications' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="bell" />{notifications.filter(n => n.type === 'urgent').length > 0 && <span className="absolute top-2 right-6 bg-rose-500 w-1.5 h-1.5 rounded-full"></span>}<span className="text-[8px] mt-0.5">सुझाव</span></button>
                <button type="button" onClick={() => setActiveTab('profile')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'profile' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="user" /><span className="text-[8px] mt-0.5">प्रोफाइल</span></button>
              </nav>
            </div>
            <footer className="w-full max-w-md text-center py-2 text-[9px] text-slate-500">सजग छात्र v2.5 Ultimate</footer>
          </div>
        );
      }

      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(React.createElement(App));
    </script>
</body>
</html>
