<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजक छात्र</title>
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
      .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-spin-slow { animation: spin 8s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 999px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 transition-colors duration-300 min-h-screen flex flex-col justify-between">
    <div id="root" class="w-full flex-1 flex flex-col justify-between"></div>

    <!-- React, ReactDOM, Babel और Lucide Icons के आवश्यक CDN पैकेजेस -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React Logic Script -->
    <script type="text/babel">
      const useState = React.useState;
      const useEffect = React.useEffect;

      function Icon({ name, className = "w-4 h-4" }) {
        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
        return <i data-lucide={name} className={className}></i>;
      }

      function AdSenseUnit({ slotId }) {
        useEffect(() => {
          try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } 
          catch (e) { console.error("AdSense Blocked or Empty", e); }
        }, [slotId]);
        return (
          <div className="my-2 mx-auto bg-slate-900/40 dark:bg-slate-950/40 p-1 rounded-xl border border-slate-800/40 flex items-center justify-center overflow-hidden min-h-[60px] w-full max-w-6xl text-[9px] text-slate-600">
             <ins className="adsbygoogle" style={{ display: 'block' }} data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot={slotId} data-ad-format="horizontal" data-full-width-responsive="true"></ins>
          </div>
        );
      }

      // --- 💾 FREE LOCAL INDEXEDDB UTILITY ENGINE ---
      const initDB = () => {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("SajagStudentDB", 1);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("pdfs")) db.createObjectStore("pdfs", { keyPath: "id" });
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject("DB Open Error");
        });
      };

      const savePDFToDB = async (id, base64Data, fileName) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction("pdfs", "readwrite");
          const store = transaction.objectStore("pdfs");
          const request = store.put({ id, data: base64Data, name: fileName });
          request.onsuccess = () => resolve(true); request.onerror = () => reject(false);
        });
      };

      const getPDFFromDB = async (id) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction("pdfs", "readonly");
          const store = transaction.objectStore("pdfs");
          const request = store.get(id);
          request.onsuccess = (e) => resolve(e.target.result); request.onerror = () => reject(null);
        });
      };

      const deletePDFFromDB = async (id) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction("pdfs", "readwrite");
          const store = transaction.objectStore("pdfs");
          const request = store.delete(id);
          request.onsuccess = () => resolve(true); request.onerror = () => reject(false);
        });
      };

      const playTimerAlarm = () => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
          oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
          oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.8);
        } catch (e) { console.error("Audio error", e); }
      };

      function App() {
        const [isDarkMode, setIsDarkMode] = useState(() => {
          const savedTheme = localStorage.getItem('sajag_theme');
          return savedTheme ? savedTheme === 'dark' : true;
        });

        const [user, setUser] = useState(() => {
          const localUser = localStorage.getItem('sajag_user');
          return localUser ? JSON.parse(localUser) : {
            name: 'रोशन लाल साहू', category: 'प्रतियोगी परीक्षा (Competitive Exams)', availableHours: 6, streak: 5, points: 350, pomodoroRounds: 0
          };
        });

        const [studyLogs, setStudyLogs] = useState(() => {
          const localLogs = localStorage.getItem('sajag_logs');
          return localLogs ? JSON.parse(localLogs) : [
            {
              id: 1, subject: 'भौतिक विज्ञान (Physics)', topic: 'घर्षण और गति के नियम (Friction & Laws of Motion)',
              date: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString().split('T')[0], 
              difficulty: 'कठिन (Hard)', timeSpent: 2, hasPdf: false, currentStage: 1,
              customQuiz: { question: "गति का प्रथम नियम क्या कहलाता है?", answer: "जड़त्व का नियम (Law of Inertia)" },
              stages: [
                { name: 'R1 (24h)', due: new Date(Date.now()).toISOString().split('T')[0], completed: false },
                { name: 'R2 (3d)', due: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
                { name: 'R3 (7d)', due: new Date(Date.now() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
                { name: 'Test (15d)', due: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false }
              ]
            }
          ];
        });

        const [profileForm, setProfileForm] = useState({ name: user.name, availableHours: user.availableHours, category: user.category });
        const [newLog, setNewLog] = useState({ subject: '', customSubject: '', topic: '', difficulty: 'मध्यम (Medium)', timeSpent: 2, quizQ: '', quizA: '' });
        const [pdfFile, setPdfFile] = useState(null);
        const [backupInputCode, setBackupInputCode] = useState('');
        const [flippedCards, setFlippedCards] = useState({});
        const [searchQuery, setSearchQuery] = useState(''); // 🔍 सर्च स्टेट
        const [reminderTime, setReminderTime] = useState(''); // ⏰ रिमाइंडर अलार्म स्टेट

        const [timer, setTimer] = useState({ minutes: 25, seconds: 0, isActive: false, mode: 'Focus' });
        const [treeState, setTreeState] = useState('🌱');
        const [activeTab, setActiveTab] = useState('dashboard');
        const [alertMsg, setAlertMsg] = useState(null);
        const [selectedTopicForTest, setSelectedTopicForTest] = useState(null);
        const [aiQuiz, setAiQuiz] = useState(null);
        const [loadingQuiz, setLoadingQuiz] = useState(false);
        const [userAnswers, setUserAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [notifications, setNotifications] = useState([]);

        const showAlert = (msg) => {
          setAlertMsg(msg); setTimeout(() => setAlertMsg(null), 4000);
        };

        // ⏰ सुधार: स्मार्ट थीम शेड्यूलर (सुबह 6 से शाम 6 लाइट, अन्यथा डार्क)
        useEffect(() => {
          const currentHour = new Date().getHours();
          const shouldBeDark = currentHour < 6 || currentHour >= 18;
          setIsDarkMode(shouldBeDark);
        }, []);

        useEffect(() => {
          const root = window.document.documentElement;
          if (isDarkMode) { root.classList.add('dark'); root.style.backgroundColor = "#020617"; localStorage.setItem('sajag_theme', 'dark'); } 
          else { root.classList.remove('dark'); root.style.backgroundColor = "#f8fafc"; localStorage.setItem('sajag_theme', 'light'); }
        }, [isDarkMode]);

        // ⏰ सुधार: बैकग्राउंड रिमाइंडर अलार्म चेकर क्लॉक इंजन
        useEffect(() => {
          const interval = setInterval(() => {
            if (reminderTime) {
              const now = new Date();
              const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
              if (timeStr === reminderTime) {
                playTimerAlarm();
                showAlert("🔔 अलार्म! आपके पढ़ाई का समय हो गया है, कृपया फोकस करें।");
                setReminderTime(''); // ट्रिगर के बाद रीसेट
              }
            }
          }, 30000); // हर 30 सेकंड में चेक करेगा
          return () => clearInterval(interval);
        }, [reminderTime]);

        useEffect(() => { localStorage.setItem('sajag_user', JSON.stringify(user)); }, [user]);
        useEffect(() => { localStorage.setItem('sajag_logs', JSON.stringify(studyLogs)); }, [studyLogs]);
        useEffect(() => { setProfileForm({ name: user.name, availableHours: user.availableHours, category: user.category }); }, [user]);

        useEffect(() => {
          const todayStr = new Date().toISOString().split('T')[0];
          const generatedAlerts = [];
          studyLogs.forEach(log => {
            const activeStage = log.stages.find(s => !s.completed);
            if (activeStage && activeStage.due === todayStr) {
              generatedAlerts.push({ id: `alert-${log.id}`, title: `स्मार्ट रिवीजन अलर्ट: ${log.subject} 💡`, text: `आज रिवीजन का समय है। अभ्यास टेस्ट लें!`, type: 'urgent', actionTopic: log });
            }
          });
          generatedAlerts.push({ id: 'focus-tip-1', title: 'एकाग्रता सुधार गाइड ⚡', text: 'लगातार 45 मिनट से अधिक न पढ़ें। फोकस टाइमर का उपयोग करें!', type: 'tip' });
          setNotifications(generatedAlerts);
        }, [studyLogs]);

        useEffect(() => {
          if (!timer.isActive) {
            if (timer.minutes === 25 && timer.seconds === 0) setTreeState('🌱');
            else if (timer.mode === 'Focus') setTreeState('🍂');
            return;
          }
          if (timer.mode === 'Focus') {
            if (timer.minutes < 5) setTreeState('🌳');
            else if (timer.minutes < 15) setTreeState('🌿');
            else setTreeState('🌱');
          } else {
            setTreeState('🎉');
          }
        }, [timer.minutes, timer.isActive, timer.mode]);

        const handleViewPdf = async (logId) => {
          try {
            const pdfRecord = await getPDFFromDB(logId);
            if (!pdfRecord || !pdfRecord.data) { showAlert("⚠️ कोई PDF फाइल नहीं मिली!"); return; }
            const base64Parts = pdfRecord.data.split(',');
            const mimeType = base64Parts[0].match(/:(.*?);/)[1];
            const rawBinary = atob(base64Parts[1]);
            const arrayLength = rawBinary.length;
            const uint8Array = new Uint8Array(arrayLength);
            for (let i = 0; i < arrayLength; i++) uint8Array[i] = rawBinary.charCodeAt(i);
            const blob = new Blob([uint8Array], { type: mimeType });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
            setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
          } catch (error) { showAlert("⚠️ PDF खोलने में समस्या हुई।"); }
        };

        const handleDeletePdf = async (logId) => {
          const success = await deletePDFFromDB(logId);
          if (success) {
            setStudyLogs(prev => prev.map(log => log.id === logId ? { ...log, hasPdf: false } : log));
            showAlert("🗑️ PDF फाइल डिलीट कर दी गई!");
          }
        };

        const handleDeleteLog = async (logId) => {
          if(confirm("क्या आप वाकई इस पूरे स्टडी टॉपिक को हटाना चाहते हैं?")) {
            await deletePDFFromDB(logId);
            setStudyLogs(prev => prev.filter(log => log.id !== logId));
            showAlert("🗑️ स्टडी टॉपिक सफलतापूर्वक हटा दिया गया है!");
          }
        };

        const handleFileChange = (e) => {
          const file = e.target.files[0];
          if (file && file.type === "application/pdf") {
            if (file.size > 5 * 1024 * 1024) { showAlert("⚠️ साइज 5MB से कम होना चाहिए!"); e.target.value = ""; return; }
            setPdfFile(file);
          } else { showAlert("⚠️ केवल PDF फाइल चुनें!"); e.target.value = ""; }
        };

        const handleAddLog = async (e) => {
          e.preventDefault();
          const finalSubject = newLog.subject === 'अन्य (Custom)' ? newLog.customSubject : newLog.subject;
          if (!finalSubject || !newLog.topic) { showAlert('⚠️ कृपया विषय और टॉपिक दर्ज करें!'); return; }

          const logId = Date.now();
          let hasPdf = false;
          if (pdfFile) {
            hasPdf = true;
            const reader = new FileReader(); reader.readAsDataURL(pdfFile);
            reader.onload = async () => { await savePDFToDB(logId, reader.result, pdfFile.name); };
          }

          let cQuiz = null;
          if (newLog.quizQ.trim() && newLog.quizA.trim()) {
            cQuiz = { question: newLog.quizQ, answer: newLog.quizA };
          }

          const todayStr = new Date().toISOString().split('T')[0];
          let d1 = new Date(); d1.setDate(d1.getDate() + 1);
          let d2 = new Date(); d2.setDate(d2.getDate() + 3);
          let d3 = new Date(); d3.setDate(d3.getDate() + 7);
          let d4 = new Date(); d4.setDate(d4.getDate() + 15);

          const newEntry = {
            id: logId, subject: finalSubject, topic: newLog.topic, date: todayStr, difficulty: newLog.difficulty,
            timeSpent: parseFloat(newLog.timeSpent) || 1, hasPdf: hasPdf, currentStage: 1, customQuiz: cQuiz,
            stages: [
              { name: 'R1 (24h)', due: d1.toISOString().split('T')[0], completed: false },
              { name: 'R2 (3d)', due: d2.toISOString().split('T')[0], completed: false },
              { name: 'R3 (7d)', due: d3.toISOString().split('T')[0], completed: false },
              { name: 'Test (15d)', due: d4.toISOString().split('T')[0], completed: false }
            ]
          };

          setStudyLogs([newEntry, ...studyLogs]);
          setUser(prev => ({ ...prev, points: prev.points + 50 }));
          showAlert('🚀 पढ़ाई का ब्यौरा सुरक्षित हो गया! +50 XP!');
          setNewLog({ subject: '', customSubject: '', topic: '', difficulty: 'मध्यम (Medium)', timeSpent: 2, quizQ: '', quizA: '' });
          setPdfFile(null); setActiveTab('dashboard');
        };

        const handleUpdateProfile = (e) => {
          e.preventDefault();
          if (!profileForm.name.trim()) return;
          setUser(prev => ({ ...prev, name: profileForm.name, availableHours: parseInt(profileForm.availableHours) || 6, category: profileForm.category }));
          showAlert('👤 प्रोफाइल डेटा सुरक्षित हो गया!'); setActiveTab('dashboard');
        };

        // 📊 सुधार: वीकली स्टडी रिपोर्ट को CSV फाइल के रूप में एक्सपोर्ट/डाउनलोड करने का इंजन
        const exportToCSVReport = () => {
          if (studyLogs.length === 0) { showAlert("⚠️ निर्यात करने के लिए कोई डेटा नहीं है!"); return; }
          let csvContent = "data:text/csv;charset=utf-8,विषय,टॉपिक,तारीख,समय बिताया (घंटे),स्थिति\n";
          studyLogs.forEach(log => {
            const status = log.stages.every(s => s.completed) ? "मास्टर (Complete)" : "सक्रिय (In-Progress)";
            csvContent += `"${log.subject}","${log.topic}","${log.date}",${log.timeSpent},"${status}"\n`;
          });
          const encodedUri = encodeURI(csvContent);
          const link = document.createElement("a");
          link.setAttribute("href", encodedUri);
          link.setAttribute("download", `Sajag_Chhatra_Report_${new Date().toISOString().split('T')[0]}.csv`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showAlert("📊 आपकी साप्ताहिक रिपोर्ट सफलतापूर्वक डाउनलोड हो गई है!");
        };

        const generateTextBackup = () => {
          const backupData = { user, studyLogs };
          const jsonString = JSON.stringify(backupData);
          const base64Str = btoa(encodeURIComponent(jsonString).replace(/%([0-9A-F]{2})/g, (match, p1) => {
            return String.fromCharCode(parseInt(p1, 16));
          }));
          navigator.clipboard.writeText(base64Str); 
          showAlert("📋 बैकअप कोड कॉपी हो गया है!");
        };

        const handleRestoreData = (e) => {
          e.preventDefault();
          try {
            if (!backupInputCode.trim()) return;
            const decodedJson = decodeURIComponent(atob(backupInputCode.trim()).split('').map((c) => {
              return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            const decodedData = JSON.parse(decodedJson);
            if (decodedData.user && decodedData.studyLogs) {
              setUser(decodedData.user); setStudyLogs(decodedData.studyLogs);
              showAlert("✅ डेटा सफलतापूर्वक रिस्टोर हो गया!"); setBackupInputCode(''); setActiveTab('dashboard');
            }
          } catch (err) { showAlert("⚠️ कोड सही नहीं है या विकृत है।"); }
        };

        const handleGenerateQuiz = async (log) => {
          setSelectedTopicForTest(log); setAiQuiz(null); setUserAnswers({}); setQuizSubmitted(false); setLoadingQuiz(true); setActiveTab('test-arena');
          setTimeout(() => {
            const simulatedQuestions = [
              { question: `निम्न में से कौन सा विकल्प "${log.topic}" संकल्पने के संदर्भ में सबसे महत्वपूर्ण है?`, options: ["सैद्धांतिक अनुप्रयोग", "व्यावहारिक अनुभव", "गणितीय समीकरण", "उपरोक्त सभी"], correctIndex: 3, explanation: "यह अवधारणा तीनों आयामों को संतुलित तरीके से समझाती है।" },
              { question: `इस विषय में मेमोरी रिटेंशन बढ़ाने का वैज्ञानिक तरीका क्या है?`, options: ["एक बार पढ़ना", "स्टैस्ड रिपीटीशन और सक्रिय टेस्ट", "नोट्स रटना", "परीक्षा से पहले पढ़ना"], correctIndex: 1, explanation: "वैज्ञानिक शोधों के अनुसार एक्टिव रिकॉल और स्पैस्ड रिपीटीशन ही सर्वोत्तम है।" }
            ];
            setAiQuiz(simulatedQuestions); setLoadingQuiz(false);
          }, 1200);
        };

        const handleSubmitQuiz = () => {
          setQuizSubmitted(true);
          let correctCount = 0;
          aiQuiz.forEach((q, idx) => { if (userAnswers[idx] === q.correctIndex) correctCount++; });
          const pointsWon = correctCount * 20;
          setUser(prev => ({ ...prev, points: prev.points + pointsWon, streak: prev.streak + 1 }));
          showAlert(`🎉 टेस्ट समाप्त! स्कोर: ${correctCount}/${aiQuiz.length}. +${pointsWon} XP!`);
          if (correctCount >= 1 && selectedTopicForTest) promoteRevisionStage(selectedTopicForTest.id);
        };

        const promoteRevisionStage = (logId) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const nextStage = log.currentStage + 1;
              const isFinalTestCompleting = log.currentStage === 4;
              
              const updatedStages = log.stages.map((stage, sIdx) => {
                if (sIdx === log.currentStage - 1) return { ...stage, completed: true }; return stage;
              });

              if (isFinalTestCompleting) {
                setTimeout(() => showAlert("🏆 अद्भुत! आपने इस टॉपिक पर 100% महारत हासिल कर ली है! +100 XP बोनस!"), 500);
                setUser(prev => ({ ...prev, points: prev.points + 100 }));
              }

              return { ...log, currentStage: nextStage > 4 ? 4 : nextStage, stages: updatedStages };
            }
            return log;
          }));
        };

        const handleMakeStageCompletedDirect = (logId, stageIndex) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const updatedStages = [...log.stages]; 
              updatedStages[stageIndex].completed = true;
              const nextStage = stageIndex + 2;
              const isFinalTestCompleting = stageIndex === 3;

              if (isFinalTestCompleting) {
                setTimeout(() => showAlert("🏆 अद्भुत! आपने इस टॉपिक पर 100% महारत हासिल कर ली है! +100 XP बोनस!"), 500);
                setUser(prev => ({ ...prev, points: prev.points + 100 }));
              }

              return { ...log, currentStage: nextStage > 4 ? 4 : nextStage, stages: updatedStages };
            }
            return log;
          }));
        };

        const getHeatmapColor = (dayOffset) => {
          const checkDate = new Date();
          checkDate.setDate(checkDate.getDate() - dayOffset);
          const dateStr = checkDate.toISOString().split('T')[0];
          const totalHours = studyLogs.filter(log => log.date === dateStr).reduce((sum, current) => sum + current.timeSpent, 0);
          if (totalHours === 0) return 'bg-slate-800';
          if (totalHours < 2) return 'bg-emerald-900';
          if (totalHours < 4) return 'bg-emerald-700';
          return 'bg-emerald-500';
        };

        // 🔍 सुधार: सर्च क्वेरी के हिसाब से फ़िल्टर्ड डेटा एरे इंजनों की रेंडरिंग संरचना
        const filteredLogs = studyLogs.filter(log =>

                        {timer.isActive ? '⏸ रोकें' : '▶ शुरू करें'}
                      </button>
                      <button type="button" onClick={() => setTimer({ minutes: timer.mode === 'Focus' ? 25 : 5, seconds: 0, isActive: false, mode: timer.mode })} className="bg-slate-800 border border-slate-700 text-slate-300 px-5 py-2 rounded-full font-bold">🔄 रीसेट</button>
                    </div>
                  </div>
                )}

                {activeTab === 'notifications' && (
                  <div className="max-w-xl mx-auto space-y-4 text-xs">
                    {/* ⏰ रिमाइंडर अलार्म विन्यास (New Alarm Scheduler View) */}
                    <div className="bg-slate-950/40 border border-slate-800 p-4 rounded-xl space-y-2">
                      <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider flex items-center gap-1"><Icon name="clock" /> ककस्टमाइज़्ड डेली स्टडी रिमाइंडर अलार्म</span>
                      <div className="flex gap-2 pt-1">
                        <input 
                          type="time" 
                          value={reminderTime} 
                          onChange={(e) => setReminderTime(e.target.value)}
                          className="bg-slate-900 border border-slate-800 rounded-xl p-2 text-slate-200 outline-none"
                        />
                        <button type="button" onClick={() => { if(reminderTime) showAlert(`⏰ रिमाइंडर सफलतापूर्वक ${reminderTime} बजे के लिए सेट हो गया!`); }} className="bg-indigo-600 px-4 rounded-xl text-white font-bold text-[11px]">रिमाइंडर लॉक करें</button>
                      </div>
                      {reminderTime && <p className="text-[9px] text-emerald-400 font-medium">सक्रिय अलार्म समय: आज {reminderTime} बजे</p>}
                    </div>

                    <h3 className="text-sm font-bold border-b border-slate-800 pb-2">🧠 एआई विश्लेषक सुझाव केंद्र</h3>
                    {notifications.map((notif, idx) => (
                      <div key={idx} className={`p-4 border rounded-xl flex flex-col sm:flex-row justify-between sm:items-center gap-3 ${notif.type === 'urgent' ? 'bg-rose-950/20 border-rose-900/40 text-rose-300' : 'bg-indigo-950/25 border-indigo-900/40 text-indigo-300'}`}>
                        <div>
                          <h4 className="font-bold text-white mb-0.5">{notif.title}</h4>
                          <p className="text-[11px] text-slate-300">{notif.text}</p>
                        </div>
                        {notif.actionTopic && ( <button onClick={() => handleGenerateQuiz(notif.actionTopic)} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-1 flex-shrink-0"><Icon name="brain" className="w-3 h-3" /><span>अभी टेस्ट लें</span></button> )}
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === 'profile' && (
                  <div className="max-w-xl mx-auto grid grid-cols-1 gap-6">
                    {/* 📊 वीकली प्रोग्रेस डाउनलोडर ट्रिगर बटन */}
                    <div className="bg-slate-950/40 border border-slate-800 p-4 rounded-xl space-y-2 text-xs">
                      <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider block">📊 अध्ययन रिपोर्ट डेटा सेंटर</span>
                      <p className="text-[10px] text-slate-400">अपने पूरे अध्ययन चक्र का सारांश एक्सेल / सीएसवी शीट के रूप में ऑफ़लाइन सुरक्षित करें।</p>
                      <button type="button" onClick={exportToCSVReport} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold py-2 rounded-xl text-center shadow-md">
                        📥 स्टडी रिपोर्ट (.CSV) डाउनलोड करें
                      </button>
                    </div>

                    <form onSubmit={handleUpdateProfile} className="space-y-4 text-xs dark:text-slate-200 light:text-slate-800">
                      <div className="bg-slate-950 dark:bg-slate-950 light:bg-slate-100 rounded-xl p-4 border border-slate-800 space-y-3">
                        <div className="flex justify-between items-center">
                          <h4 className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider">विद्यार्थी प्रोफाइल विन्यास</h4>
                          <div className="flex gap-1.5">
                            {user.points >= 500 && <span className="text-xs p-1 bg-slate-900 rounded border border-amber-500/40" title="मेमोरी मास्टर बैज">🎖️</span>}
                            {user.pomodoroRounds >= 1 && <span className="text-xs p-1 bg-slate-900 rounded border border-indigo-500/40" title="फोकस निंजा बैज">🥷</span>}
                          </div>
                        </div>
                        <div>
                          <label className="block text-slate-400 mb-1">आपका नाम:</label>
                          <input type="text" value={profileForm.name} onChange={(e) => setProfileForm({ ...profileForm, name: e.target.value })} className="w-full bg-slate-900 light:bg-white border border-slate-800 rounded-xl p-2" />
                        </div>
                        <div>
                          <label className="block text-slate-400 mb-1">दैनिक उपलब्ध घंटे लक्ष्य:</label>
                          <input type="number" min="1" max="24" value={profileForm.availableHours} onChange={(e) => setProfileForm({ ...profileForm, availableHours: e.target.value })} className="w-full bg-slate-900 light:bg-white border border-slate-800 rounded-xl p-2" />
                        </div>
                      </div>
                      <button type="submit" className="w-full bg-indigo-600 font-bold py-2.5 rounded-xl text-white shadow-md hover:bg-indigo-700 transition">💾 प्रोफाइल डेटा सुरक्षित करें</button>
                    </form>

                    <div className="bg-slate-950 dark:bg-slate-950 light:bg-slate-100 rounded-xl p-4 border border-slate-800 space-y-3 text-xs">
                      <h4 className="text-[10px] font-bold text-emerald-400 uppercase tracking-wider">डेटा बैकअप सुरक्षा केंद्र</h4>
                      <button onClick={generateTextBackup} type="button" className="w-full bg-slate-900 dark:bg-slate-900 light:bg-white border border-emerald-500/40 text-emerald-400 font-bold py-2 rounded-xl">📋 बैकअप कोड कॉपी करें</button>
                      <form onSubmit={handleRestoreData} className="pt-2 border-t border-slate-800 space-y-2">
                        <input type="text" placeholder="कोड यहाँ पेस्ट करें..." value={backupInputCode} onChange={(e) => setBackupInputCode(e.target.value)} className="w-full bg-slate-900 light:bg-white border border-slate-800 rounded-xl p-2" />
                        <button type="submit" className="w-full bg-emerald-700 font-bold py-2 rounded-xl text-white">🔄 डेटा रिस्टोर करें</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            </main>

            <nav className="md:hidden fixed bottom-0 left-0 right-0 h-14 bg-slate-950 border-t border-slate-800 flex justify-around items-center px-1 z-30">
              <button type="button" onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'dashboard' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="book-open" /><span className="text-[8px] mt-0.5">ट्रैकर</span></button>
              <button type="button" onClick={() => setActiveTab('log')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'log' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="plus-circle" /><span className="text-[8px] mt-0.5">दर्ज करें</span></button>
              <button type="button" onClick={() => setActiveTab('timer')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'timer' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="clock" /><span className="text-[8px] mt-0.5">फोकस</span></button>
              <button type="button" onClick={() => setActiveTab('notifications')} className={`flex flex-col items-center justify-center flex-1 py-1 relative ${activeTab === 'notifications' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="bell" /><span className="absolute top-2 right-6 bg-rose-500 w-1.5 h-1.5 rounded-full"></span><span className="text-[8px] mt-0.5">सुझाव</span></button>
              <button type="button" onClick={() => setActiveTab('profile')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'profile' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><Icon name="user" /><span className="text-[8px] mt-0.5">प्रोफाइल</span></button>
            </nav>

            <AdSenseUnit slotId="FOOTER_SLOT_ID" />
            <footer className="w-full text-center py-2 text-[9px] text-slate-500 hidden md:block">सजक छात्र</footer>
          </div>
        );
      }

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(React.createElement(App));
      }
    </script>
</body>
</html>
