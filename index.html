<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजग छात्र Ultimate</title>
    
    <!-- PWA Manifest Link -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="transition-colors duration-300 antialiased selection:bg-indigo-500/30 bg-slate-950">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
      }
    </script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const t = {
        hi: {
          title: "सजग छात्र", subtitle: "वैज्ञानिक 5-स्टेज रिवीजन ट्रैकर व फोकस टाइमर", streak: "दिन", hoursBooked: "घंटे बुक हैं", available: "उपलब्ध", completedFull: "पूर्ण!", budgetTitle: "दैनिक अध्ययन समय बजट", trackerTitle: "📅 सक्रिय मेमोरी ट्रैकर", aiTestBtn: "🤖 AI टेस्ट", addLogTitle: "🚀 आज जो पढ़ा, उसे दर्ज करें", labelSubject: "विषय (Subject):", selectOpt: "-- चुनें --", labelTopic: "टॉपिक (Topic Name):", labelTime: "समय (घंटे):", btnSave: "🚀 सुरक्षित करें", customTimerLabel: "कस्टम फोकस समय (मिनट):", btnStart: "▶ शुरू करें", btnPause: "⏸ रोकें", btnReset: "🔄 रीसेट", suggestTitle: "🔔 स्मार्ट सुझाव", navTracker: "📖 ट्रैकर", navAdd: "➕ दर्ज", navFocus: "⏱ फोकस", navSuggest: "🔔 सुझाव", navProfile: "👤 प्रोफाइल", navInfo: "ℹ️ निर्देश", backupTitle: "💾 डेटा बैकअप", btnExport: "📤 एक्सपोर्ट", btnImport: "📥 इम्पोर्ट", aiSettings: "🤖 AI टेस्ट कुंजी", btnSaveKey: "💾 कुंजी सुरक्षित करें", analyticsTitle: "📊 साप्ताहिक अध्ययन विश्लेषण", quickNotesTitle: "📝 क्विक नोट्स", saveNotesBtn: "💾 सेव", medalsTitle: "🏅 उपलब्धियां", levelText: "अध्ययन स्तर", notesPlaceholder: "महत्वपूर्ण सूत्र यहाँ लिखें...", dueOnly: "केवल आज का रिवीजन दिखाएं (Due Today)", feynmanBtn: "🗣️ फेनमैन मोड", verifyFeynman: "✅ जांचें", feynmanPlaceholder: "इस टॉपिक को अपनी भाषा में समझाएं...", resetCycle: "🔄 रीसेट चक्र", howToUseTitle: "🛠️ उपयोग कैसे करें?", step1: "1. 'दर्ज करें' टैब में नया टॉपिक डालें।", step2: "2. ऐप आपको R1 से Mastery तक का 30-दिन का शेड्यूल देगा।", step3: "3. टॉपिक भूल जाने पर 'रीसेट चक्र' दबाएं।", step4: "4. फेनमैन मोड में AI को टॉपिक समझाकर अपनी समझ जांचें।"
        },
        en: {
          title: "Sajag Chhatra", subtitle: "Scientific 5-Stage Revision Tracker & Focus Timer", streak: "Days", hoursBooked: "Hours Booked", available: "Available", completedFull: "Full!", budgetTitle: "Daily Study Time Budget", trackerTitle: "📅 Active Memory Tracker", aiTestBtn: "🤖 AI Test", addLogTitle: "🚀 Log Today's Study", labelSubject: "Subject:", selectOpt: "-- Select --", labelTopic: "Topic Name:", labelTime: "Time (Hours):", btnSave: "🚀 Save Details", customTimerLabel: "Custom Focus Time (Mins):", btnStart: "▶ Start", btnPause: "⏸ Pause", btnReset: "🔄 Reset", suggestTitle: "🔔 Smart Suggestion", navTracker: "📖 Tracker", navAdd: "➕ Add", navFocus: "⏱ Focus", navSuggest: "🔔 Hints", navProfile: "👤 Profile", navInfo: "ℹ️ Guide", backupTitle: "Data Backup", btnExport: "📤 Export", btnImport: "📥 Import", aiSettings: "🤖 AI Key", btnSaveKey: "💾 Save Key", analyticsTitle: "📊 Weekly Analytics", quickNotesTitle: "📝 Quick Notes", saveNotesBtn: "💾 Save", medalsTitle: "🏅 Achievements", levelText: "Level", notesPlaceholder: "Write key formulas here...", dueOnly: "Show Due Revisions Only", feynmanBtn: "🗣️ Feynman Mode", verifyFeynman: "✅ Verify", feynmanPlaceholder: "Explain this topic...", resetCycle: "🔄 Reset Cycle", howToUseTitle: "🛠️ How to use?", step1: "1. Add a topic in 'Add' tab.", step2: "2. Follow the 30-day R1 to Mastery schedule.", step3: "3. Use 'Reset Cycle' if you forget.", step4: "4. Test yourself with Feynman Mode & AI."
        }
      };

      function App() {
        const [lang, setLang] = useState('hi');
        const [isDarkMode, setIsDarkMode] = useState(true);
        const [showDueOnly, setShowDueOnly] = useState(false);
        const [user, setUser] = useState({ name: 'रोशन लाल साहू', category: 'प्रतियोगी परीक्षा (Competitive Exams)', availableHours: 6, streak: 5, points: 350 });

        const [studyLogs, setStudyLogs] = useState(() => {
          const savedLogs = localStorage.getItem('user_study_logs');
          return savedLogs ? JSON.parse(savedLogs) : [
            {
              id: 1, subject: 'भौतिक विज्ञान (Physics)', topic: 'घर्षण और गति के नियम (Friction & Laws of Motion)', date: new Date().toISOString().split('T')[0], difficulty: 'कठिन (Hard)', timeSpent: 2, notes: 'F=ma, घर्षण बल = uN', currentStage: 1, 
              stages: [
                { name: 'R1 (24h)', due: new Date().toISOString().split('T')[0], completed: true },
                { name: 'R2 (3d)', due: new Date(Date.now() + 3*24*60*60*1000).toISOString().split('T')[0], completed: false },
                { name: 'R3 (7d)', due: new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0], completed: false },
                { name: 'R4 (15d)', due: new Date(Date.now() + 15*24*60*60*1000).toISOString().split('T')[0], completed: false },
                { name: 'Mastery', due: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0], completed: false }
              ]
            }
          ];
        });

        useEffect(() => { localStorage.setItem('user_study_logs', JSON.stringify(studyLogs)); }, [studyLogs]);
        useEffect(() => { document.body.className = isDarkMode ? 'bg-slate-950 transition-colors' : 'bg-slate-100 transition-colors'; }, [isDarkMode]);

        const [newLog, setNewLog] = useState({ subject: '', customSubject: '', topic: '', timeSpent: 2 });
        const [timer, setTimer] = useState({ minutes: 25, seconds: 0, isActive: false });
        const [activeTab, setActiveTab] = useState('dashboard');
        const [alertMsg, setAlertMsg] = useState(null);
        
        const [inputApiKey, setInputApiKey] = useState(localStorage.getItem('user_gemini_key') || '');
        const [activeNotesLogId, setActiveNotesLogId] = useState(null);
        const [tempNotesText, setTempNotesText] = useState('');
        const [activeFeynmanLogId, setActiveFeynmanLogId] = useState(null);
        const [feynmanText, setFeynmanText] = useState('');
        const [feynmanEvaluation, setFeynmanEvaluation] = useState('');
        const [loadingFeynman, setLoadingFeynman] = useState(false);
        const [aiQuiz, setAiQuiz] = useState(null);
        const [loadingQuiz, setLoadingQuiz] = useState(false);
        const [userAnswers, setUserAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);

        const showAlert = (msg) => { setAlertMsg(msg); setTimeout(() => setAlertMsg(null), 4000); };

        const handleMarkNextStage = (logId) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const updatedStages = [...log.stages];
              const nextPendingIdx = updatedStages.findIndex(s => !s.completed);
              if (nextPendingIdx !== -1) {
                updatedStages[nextPendingIdx].completed = true;
                showAlert(`✅ स्टेज ${updatedStages[nextPendingIdx].name} पूर्ण! +20 XP`);
                setUser(u => ({ ...u, points: u.points + 20 }));
                return { ...log, stages: updatedStages };
              }
            }
            return log;
          }));
        };

        const handleResetRevisionCycle = (logId) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const today = new Date();
              const getDue = (days) => new Date(today.getTime() + days * 24*60*60*1000).toISOString().split('T')[0];
              showAlert("🔄 रिवीजन चक्र रीसेट कर दिया गया!");
              return { ...log, stages: [
                { name: 'R1 (24h)', due: getDue(1), completed: false }, { name: 'R2 (3d)', due: getDue(3), completed: false },
                { name: 'R3 (7d)', due: getDue(7), completed: false }, { name: 'R4 (15d)', due: getDue(15), completed: false },
                { name: 'Mastery', due: getDue(30), completed: false }
              ]};
            }
            return log;
          }));
        };

        const handleFeynmanVerify = async (log) => {
          const savedKey = localStorage.getItem('user_gemini_key');
          if (!savedKey) return showAlert("⚠️ पहले प्रोफाइल में Gemini API Key सेव करें!");
          if (!feynmanText.trim()) return;
          setLoadingFeynman(true); setFeynmanEvaluation('');
          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${savedKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: `Evaluate this student explanation in Hindi/English: Topic "${log.topic}". Student says: "${feynmanText}". Point out mistakes and give 1 tip.` }] }] })
            });
            const data = await res.json();
            setFeynmanEvaluation(data.candidates[0].content.parts[0].text);
            setUser(u => ({ ...u, points: u.points + 30 }));
          } catch (err) { setFeynmanEvaluation("❌ AI Connection Failed."); }
          setLoadingFeynman(false);
        };

        const handleGenerateQuiz = async (log) => {
          const savedKey = localStorage.getItem('user_gemini_key');
          if (!savedKey) { setActiveTab('profile'); return showAlert("⚠️ API Key required!"); }
          setAiQuiz(null); setUserAnswers({}); setQuizSubmitted(false); setLoadingQuiz(true); setActiveTab('test-arena');
          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${savedKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: `Create a 3-question MCQ JSON test for Topic: "${log.topic}". Format: {"questions": [{"question": "...", "options": ["A","B","C","D"], "correctIndex": 0, "explanation": "..."}]}` }] }], generationConfig: { responseMimeType: "application/json" } })
            });
            const data = await res.json();
            setAiQuiz(JSON.parse(data.candidates[0].content.parts[0].text).questions);
          } catch (error) { showAlert("⚠️ Test generation failed."); setActiveTab('dashboard'); }
          setLoadingQuiz(false);
        };

        const handleSubmitQuiz = () => {
          setQuizSubmitted(true);
          let correct = 0; aiQuiz.forEach((q, i) => { if (userAnswers[i] === q.correctIndex) correct++; });
          setUser(u => ({ ...u, points: u.points + (correct * 20) }));
          showAlert(`🎉 Score: ${correct}/3. +${correct*20} XP!`);
        };

        const handleAddLog = (e) => {
          e.preventDefault();
          const finalSub = newLog.subject === 'Custom' ? newLog.customSubject : newLog.subject;
          if (!finalSub || !newLog.topic) return;
          const today = new Date();
          const getDue = (days) => new Date(today.getTime() + days * 24*60*60*1000).toISOString().split('T')[0];
          setStudyLogs([{ id: Date.now(), subject: finalSub, topic: newLog.topic, timeSpent: parseFloat(newLog.timeSpent) || 1, notes: '', stages: [
              { name: 'R1 (24h)', due: getDue(1), completed: false }, { name: 'R2 (3d)', due: getDue(3), completed: false },
              { name: 'R3 (7d)', due: getDue(7), completed: false }, { name: 'R4 (15d)', due: getDue(15), completed: false },
              { name: 'Mastery', due: getDue(30), completed: false }
            ] }, ...studyLogs]);
          setNewLog({ subject: '', customSubject: '', topic: '', timeSpent: 2 }); setActiveTab('dashboard');
        };

        useEffect(() => {
          let interval = null;
          if (timer.isActive) {
            interval = setInterval(() => {
              if (timer.seconds > 0) setTimer(prev => ({ ...prev, seconds: prev.seconds - 1 }));
              else if (timer.minutes > 0) setTimer(prev => ({ ...prev, minutes: prev.minutes - 1, seconds: 59 }));
              else { clearInterval(interval); setTimer({ minutes: 25, seconds: 0, isActive: false }); showAlert("🔔 फोकस सत्र समाप्त!"); }
            }, 1000);
          } else clearInterval(interval);
          return () => clearInterval(interval);
        }, [timer.isActive, timer.seconds, timer.minutes]);

        const todayTotalAllocated = studyLogs.reduce((acc, log) => acc + (parseFloat(log.timeSpent) || 0), 0);
        const todayStr = new Date().toISOString().split('T')[0];

        return (
          <div className={`min-h-screen flex flex-col items-center p-2 sm:p-4 w-full max-w-md mx-auto ${isDarkMode ? 'text-slate-100' : 'text-slate-800'}`}>
            
            <header className="w-full flex justify-between items-center py-2 px-2 mb-2">
              <div className="text-left">
                <h1 className="text-xl font-black text-indigo-500 flex items-center gap-1">🧠 {t[lang].title}</h1>
                <p className={`text-[9px] ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>{t[lang].subtitle}</p>
              </div>
              <div className="flex gap-1.5 shrink-0">
                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`px-2.5 py-1.5 border rounded-xl text-[10px] font-bold shadow-sm transition ${isDarkMode ? 'bg-slate-800 border-slate-700 text-yellow-400' : 'bg-white border-slate-300 text-indigo-600'}`}>
                  {isDarkMode ? '☀️ Light' : '🌙 Dark'}
                </button>
                <button onClick={() => setLang(lang === 'hi' ? 'en' : 'hi')} className="bg-indigo-600 text-white font-bold px-2.5 py-1.5 rounded-xl text-[10px] shadow-sm">
                  🌐 {lang === 'hi' ? 'EN' : 'HI'}
                </button>
              </div>
            </header>

            <div className={`w-full flex flex-col flex-1 rounded-[24px] border shadow-2xl relative overflow-hidden mb-16 min-h-[75vh] ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
              
              {alertMsg && (
                <div className="absolute top-3 left-3 right-3 bg-indigo-600 text-white p-2.5 rounded-xl shadow-xl z-50 text-[11px] border border-indigo-400 animate-fadeIn text-center font-bold">
                  {alertMsg}
                </div>
              )}

              <div className={`text-[10px] px-4 py-2.5 flex justify-between items-center border-b ${isDarkMode ? 'bg-slate-950/80 text-slate-400 border-slate-800/60' : 'bg-white text-slate-600 border-slate-200'}`}>
                <div className="font-bold text-indigo-500">🏆 {t[lang].levelText} {Math.floor(user.points/200)+1}</div>
                <div className="flex items-center gap-2 font-semibold">
                  <span className={`px-1.5 py-0.5 rounded ${isDarkMode ? 'bg-indigo-900/40 text-indigo-400' : 'bg-indigo-100 text-indigo-700'}`}>🔥 {user.streak} {t[lang].streak}</span>
                  <span className={isDarkMode ? 'text-yellow-500' : 'text-yellow-600'}>⭐ {user.points} XP</span>
                </div>
              </div>

              <main className="flex-1 overflow-y-auto p-3.5 space-y-4">
                {activeTab === 'dashboard' && (
                  <div className="space-y-4 animate-fadeIn">
                    
                    <div className={`p-4 rounded-xl border space-y-2.5 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                      <div className="flex justify-between items-start">
                        <div>
                          <h2 className="text-[10px] text-indigo-500 font-bold uppercase">{t[lang].budgetTitle}</h2>
                          <h3 className={`text-base font-black mt-0.5 ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{todayTotalAllocated} / {user.availableHours} {t[lang].hoursBooked}</h3>
                        </div>
                      </div>
                      <div className={`w-full h-1.5 rounded-full overflow-hidden ${isDarkMode ? 'bg-slate-800' : 'bg-slate-200'}`}>
                        <div className="bg-indigo-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (todayTotalAllocated / user.availableHours) * 100)}%` }}></div>
                      </div>
                    </div>

                    <div className={`p-3 rounded-xl border space-y-3 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                      <h4 className="text-[11px] font-bold text-indigo-500">{t[lang].analyticsTitle}</h4>
                      <div className="flex justify-around items-end h-16 pt-1">
                        {[{d:"M",h:4},{d:"T",h:5.5},{d:"W",h:todayTotalAllocated,a:true},{d:"T",h:3},{d:"F",h:5},{d:"S",h:1},{d:"S",h:0}].map((b,i) => (
                          <div key={i} className="flex flex-col items-center flex-1 space-y-1">
                            <div className={`w-3.5 rounded-t transition-all ${b.a ? 'bg-indigo-500 shadow-sm shadow-indigo-500/30' : (isDarkMode ? 'bg-slate-800' : 'bg-slate-300')}`} style={{ height: `${(b.h / 6) * 40}px` }}></div>
                            <span className={`text-[8px] font-bold ${isDarkMode ? 'text-slate-500' : 'text-slate-400'}`}>{b.d}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className={`flex items-center gap-2 text-xs font-bold px-1 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                      <input type="checkbox" id="dueFilter" checked={showDueOnly} onChange={() => setShowDueOnly(!showDueOnly)} className="rounded bg-transparent w-4 h-4 accent-indigo-600 cursor-pointer" />
                      <label htmlFor="dueFilter" className="cursor-pointer select-none">{t[lang].dueOnly}</label>
                    </div>

                    <div className="space-y-3">
                      <h3 className={`text-xs font-bold uppercase tracking-wider mb-1 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>{t[lang].trackerTitle}</h3>
                      {studyLogs.filter(log => !showDueOnly || log.stages.some(s => s.due === todayStr && !s.completed)).map(log => (
                        
                        <div key={log.id} className={`p-3.5 rounded-xl border space-y-3.5 shadow-sm ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                          
                          <div className="flex justify-between items-start gap-2">
                            <div className="flex-1">
                              <span className={`text-[8px] px-1.5 py-0.5 rounded font-bold uppercase tracking-wide border ${isDarkMode ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' : 'bg-indigo-50 text-indigo-600 border-indigo-200'}`}>{log.subject}</span>
                              <h4 className={`text-xs font-bold mt-1.5 leading-snug ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{log.topic}</h4>
                            </div>
                          </div>

                          <div className="flex gap-1.5 flex-wrap">
                            <button type="button" onClick={() => handleOpenNotes(log)} className={`text-[9px] px-2.5 py-1.5 rounded-lg border font-semibold transition ${isDarkMode ? 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700' : 'bg-slate-100 text-slate-700 border-slate-300 hover:bg-slate-200'}`}>📝 Notes</button>
                            <button type="button" onClick={() => { setActiveFeynmanLogId(activeFeynmanLogId === log.id ? null : log.id); setFeynmanText(''); setFeynmanEvaluation(''); }} className={`text-[9px] px-2.5 py-1.5 rounded-lg border font-bold transition ${isDarkMode ? 'bg-purple-900/30 text-purple-400 border-purple-800/50 hover:bg-purple-900/50' : 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100'}`}>{t[lang].feynmanBtn}</button>
                            <button type="button" onClick={() => handleGenerateQuiz(log)} className="bg-indigo-600 hover:bg-indigo-700 text-white text-[9px] px-2.5 py-1.5 rounded-lg font-bold transition">{t[lang].aiTestBtn}</button>
                          </div>

                          {activeFeynmanLogId === log.id && (
                            <div className={`p-3 rounded-xl border text-xs space-y-2 animate-fadeIn ${isDarkMode ? 'bg-purple-950/20 border-purple-900/30' : 'bg-purple-50 border-purple-200'}`}>
                              <textarea value={feynmanText} onChange={(e) => setFeynmanText(e.target.value)} placeholder={t[lang].feynmanPlaceholder} className={`w-full p-2.5 rounded-lg text-[11px] focus:outline-none h-16 resize-none border ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-purple-300 text-slate-800'}`} />
                              <button type="button" onClick={() => handleFeynmanVerify(log)} disabled={loadingFeynman} className="bg-purple-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold hover:bg-purple-700">{loadingFeynman ? "..." : t[lang].verifyFeynman}</button>
                              {feynmanEvaluation && <div className={`p-2.5 rounded border text-[10px] mt-1 leading-relaxed ${isDarkMode ? 'bg-slate-950 border-purple-900/30 text-purple-300' : 'bg-white border-purple-200 text-purple-800'}`}>{feynmanEvaluation}</div>}
                            </div>
                          )}

                          {activeNotesLogId === log.id && (
                            <div className={`p-3 rounded-xl border text-xs space-y-2 animate-fadeIn ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                              <textarea value={tempNotesText} onChange={(e) => setTempNotesText(e.target.value)} placeholder={t[lang].notesPlaceholder} className={`w-full p-2 rounded-lg text-[11px] focus:outline-none h-14 resize-none border ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`} />
                              <button type="button" onClick={handleSaveNotes} className="bg-emerald-600 text-white font-bold text-[10px] px-3 py-1.5 rounded-lg">{t[lang].saveNotesBtn}</button>
                            </div>
                          )}

                          {log.notes && activeNotesLogId !== log.id && (
                            <div className={`text-[10px] italic p-2.5 rounded-lg border ${isDarkMode ? 'bg-slate-900/50 border-slate-800 text-slate-400' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>📌 {log.notes}</div>
                          )}

                          <div className="grid grid-cols-5 gap-1.5 mt-2">
                            {log.stages.map((stage, idx) => (
                              <div key={idx} className={`text-[8px] py-1.5 rounded border text-center font-bold tracking-tight transition ${stage.completed ? (isDarkMode ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-emerald-50 border-emerald-300 text-emerald-600') : (isDarkMode ? 'bg-slate-800 border-slate-700 text-slate-400' : 'bg-slate-100 border-slate-200 text-slate-500')}`}>
                                {stage.name}
                              </div>
                            ))}
                          </div>

                          <div className={`flex gap-2 pt-2 border-t ${isDarkMode ? 'border-slate-800' : 'border-slate-200'}`}>
                            <button type="button" onClick={() => handleMarkNextStage(log.id)} className={`flex-1 border text-[9px] py-1.5 rounded-lg font-bold transition ${isDarkMode ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400 hover:bg-emerald-500/20' : 'bg-emerald-50 border-emerald-200 text-emerald-700 hover:bg-emerald-100'}`}>
                              ✅ {lang === 'hi' ? 'स्टेज पूर्ण' : 'Stage Done'}
                            </button>
                            <button type="button" onClick={() => handleResetRevisionCycle(log.id)} className={`flex-1 border text-[9px] py-1.5 rounded-lg font-bold transition ${isDarkMode ? 'bg-rose-500/10 border-rose-500/20 text-rose-400 hover:bg-rose-500/20' : 'bg-rose-50 border-rose-200 text-rose-700 hover:bg-rose-100'}`}>
                              {t[lang].resetCycle}
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'log' && (
                  <form onSubmit={handleAddLog} className="space-y-4 text-xs animate-fadeIn">
                    <div>
                      <label className={`block font-semibold mb-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].labelSubject}</label>
                      <select value={newLog.subject} onChange={(e) => setNewLog({ ...newLog, subject: e.target.value })} className={`w-full border rounded-xl p-2.5 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`}>
                        <option value="">{t[lang].selectOpt}</option><option value="Physics">Physics</option><option value="Maths">Maths</option><option value="History">History</option><option value="Custom">Custom</option>
                      </select>
                    </div>
                    {newLog.subject === 'Custom' && <input type="text" placeholder="Subject name" value={newLog.customSubject} onChange={(e) => setNewLog({ ...newLog, customSubject: e.target.value })} className={`w-full border rounded-xl p-2.5 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`} />}
                    <div>
                      <label className={`block font-semibold mb-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].labelTopic}</label>
                      <input type="text" placeholder="Topic name" value={newLog.topic} onChange={(e) => setNewLog({ ...newLog, topic: e.target.value })} className={`w-full border rounded-xl p-2.5 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`} />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className={`block font-semibold mb-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].labelTime}</label>
                        <input type="number" step="0.5" min="0.5" value={newLog.timeSpent} onChange={(e) => setNewLog({ ...newLog, timeSpent: e.target.value })} className={`w-full border rounded-xl p-2.5 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`} />
                      </div>
                      <div className="pt-5"><button type="submit" className="w-full bg-indigo-600 font-bold py-2.5 rounded-xl text-white hover:bg-indigo-700">{t[lang].btnSave}</button></div>
                    </div>
                  </form>
                )}

                {activeTab === 'test-arena' && (
                  <div className="space-y-4 animate-fadeIn">
                    {loadingQuiz ? <div className="text-center py-12"><div className="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div><p className="text-xs text-slate-400">AI Generating...</p></div> : aiQuiz ? (
                      <div className="space-y-4 text-xs">
                        {aiQuiz.map((q, qIdx) => (
                          <div key={qIdx} className={`p-4 rounded-xl border space-y-3 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                            <h4 className="font-bold leading-relaxed">{qIdx + 1}. {q.question}</h4>
                            <div className="space-y-1.5">
                              {q.options.map((opt, oIdx) => (
                                <button key={oIdx} type="button" onClick={() => setUserAnswers({ ...userAnswers, [qIdx]: oIdx })} className={`w-full text-left p-2.5 rounded-lg border text-[11px] transition ${isDarkMode ? 'border-slate-700 bg-slate-900 hover:bg-slate-800' : 'border-slate-300 bg-slate-50 hover:bg-slate-100 text-slate-800'} ${userAnswers[qIdx] === oIdx ? 'ring-2 ring-indigo-500' : ''}`}>{opt}</button>
                              ))}
                            </div>
                            {quizSubmitted && <div className={`text-[10px] p-2.5 rounded border leading-normal mt-2 ${isDarkMode ? 'bg-slate-900 border-slate-700 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>{q.explanation}</div>}
                          </div>
                        ))}
                        <button onClick={handleSubmitQuiz} className="w-full bg-emerald-600 font-bold py-2.5 rounded-xl text-white hover:bg-emerald-700">Submit Test</button>
                      </div>
                    ) : null}
                  </div>
                )}

                {activeTab === 'timer' && (
                  <div className="space-y-6 flex flex-col items-center justify-center min-h-[300px] animate-fadeIn">
                    <div className="w-full flex items-center justify-between text-xs px-4">
                      <span className={`font-semibold ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>{t[lang].customTimerLabel}</span>
                      <input type="number" value={timer.minutes} onChange={(e) => setTimer(prev => ({ ...prev, minutes: parseInt(e.target.value) || 25 }))} className={`w-16 p-1.5 border rounded-lg text-center ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`} />
                    </div>
                    <div className={`text-5xl font-black font-mono tracking-wider px-8 py-4 rounded-3xl border shadow-inner ${isDarkMode ? 'text-indigo-400 bg-slate-950 border-slate-800' : 'text-indigo-600 bg-white border-slate-200'}`}>{String(timer.minutes).padStart(2, '0')}:{String(timer.seconds).padStart(2, '0')}</div>
                    <button type="button" onClick={() => setTimer(prev => ({ ...prev, isActive: !prev.isActive }))} className="px-10 py-3 rounded-2xl bg-indigo-600 font-bold text-white shadow-lg hover:bg-indigo-700">{timer.isActive ? t[lang].btnPause : t[lang].btnStart}</button>
                  </div>
                )}

                {activeTab === 'profile' && (
                  <div className="space-y-4 text-left text-xs animate-fadeIn">
                    <div className={`rounded-xl p-4 border space-y-3 shadow-sm ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                      <h4 className="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">{t[lang].aiSettings}</h4>
                      <input type="password" placeholder="Gemini API Key..." value={inputApiKey} onChange={(e) => setInputApiKey(e.target.value)} className={`w-full border p-2.5 rounded-xl focus:outline-none text-[11px] ${isDarkMode ? 'bg-slate-900 border-slate-700 text-slate-200' : 'bg-slate-50 border-slate-300 text-slate-800'}`} />
                      <button type="button" onClick={handleSaveKey} className="w-full bg-indigo-600 font-bold py-2.5 rounded-xl text-white">{t[lang].btnSaveKey}</button>
                    </div>
                    <div className={`rounded-xl p-4 border space-y-3 shadow-sm ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                      <h4 className="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">{t[lang].backupTitle}</h4>
                      <div className="grid grid-cols-2 gap-3">
                        <button type="button" onClick={handleExportData} className="bg-indigo-600 text-white py-2.5 rounded-xl font-bold">{t[lang].btnExport}</button>
                        <label className={`py-2.5 rounded-xl font-bold text-center cursor-pointer border transition ${isDarkMode ? 'bg-slate-800 text-slate-200 border-slate-700 hover:bg-slate-700' : 'bg-slate-100 text-slate-700 border-slate-300 hover:bg-slate-200'}`}>
                          {t[lang].btnImport} <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                        </label>
                      </div>
                    </div>
                  </div>
                )}
              </main>

              <nav className={`absolute bottom-0 left-0 right-0 h-14 border-t flex justify-around items-center px-1 z-20 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]'}`}>
                <button type="button" onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'dashboard' ? 'text-indigo-600 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-400')}`}><span className="text-base">📖</span><span className="text-[8px] mt-0.5">{t[lang].navTracker}</span></button>
                <button type="button" onClick={() => setActiveTab('log')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'log' ? 'text-indigo-600 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-400')}`}><span className="text-base">➕</span><span className="text-[8px] mt-0.5">{t[lang].navAdd}</span></button>
                <button type="button" onClick={() => setActiveTab('timer')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'timer' ? 'text-indigo-600 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-400')}`}><span className="text-base">⏱</span><span className="text-[8px] mt-0.5">{t[lang].navFocus}</span></button>
                <button type="button" onClick={() => setActiveTab('profile')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'profile' ? 'text-indigo-600 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-400')}`}><span className="text-base">⚙️</span><span className="text-[8px] mt-0.5">{t[lang].navProfile}</span></button>
              </nav>
            </div>
            
            <footer className={`w-full text-center py-1 text-[9px] font-semibold ${isDarkMode ? 'text-slate-600' : 'text-slate-400'}`}>sajag chhatra v2.6 • app.pmevidya.com</footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
