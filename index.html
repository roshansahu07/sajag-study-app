<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजग छात्र Ultimate</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-spin-slow { animation: spin 8s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <!-- React, ReactDOM, and Babel CDN Packages (Stable Version for CDN Setup) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Application Logic -->
    <script type="text/babel">
      // सुरक्षित तरीके से React हुक्स को निकालना
      const useState = React.useState;
      const useEffect = React.useEffect;

      function App() {
        // --- स्टेट मैनेजमेंट ---
        const [user, setUser] = useState({
          name: 'रोशन लाल साहू',
          category: 'प्रतियोगी परीक्षा (Competitive Exams)',
          availableHours: 6,
          streak: 5, 
          points: 350
        });

        const [studyLogs, setStudyLogs] = useState([
          {
            id: 1,
            subject: 'भौतिक विज्ञान (Physics)',
            topic: 'घर्षण और गति के नियम (Friction & Laws of Motion)',
            date: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString().split('T')[0], 
            difficulty: 'कठिन (Hard)',
            timeSpent: 2,
            currentStage: 1, 
            stages: [
              { name: 'R1 (24h)', due: new Date(Date.now()).toISOString().split('T')[0], completed: false },
              { name: 'R2 (3d)', due: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
              { name: 'R3 (7d)', due: new Date(Date.now() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
              { name: 'Test (15d)', due: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false }
            ]
          },
          {
            id: 2,
            subject: 'इतिहास (History)',
            topic: 'सिंधु घाटी सभ्यता (Indus Valley Civilization)',
            date: new Date(Date.now() - 4 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], 
            difficulty: 'मध्यम (Medium)',
            timeSpent: 1.5,
            currentStage: 2, 
            stages: [
              { name: 'R1 (24h)', due: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: true },
              { name: 'R2 (3d)', due: new Date(Date.now()).toISOString().split('T')[0], completed: false },
              { name: 'R3 (7d)', due: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false },
              { name: 'Test (15d)', due: new Date(Date.now() + 11 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], completed: false }
            ]
          }
        ]);

        const [newLog, setNewLog] = useState({
          subject: '', customSubject: '', topic: '', difficulty: 'मध्यम (Medium)', timeSpent: 2
        });

        const [timer, setTimer] = useState({
          minutes: 25, seconds: 0, isActive: false, mode: 'Focus' 
        });

        const [activeTab, setActiveTab] = useState('dashboard');
        const [alertMsg, setAlertMsg] = useState(null);
        const [notifications, setNotifications] = useState([]);

        const showAlert = (msg) => {
          setAlertMsg(msg);
          setTimeout(() => setAlertMsg(null), 4000);
        };

        useEffect(() => {
          const todayStr = new Date().toISOString().split('T')[0];
          const generatedAlerts = [];

          studyLogs.forEach(log => {
            const activeStage = log.stages.find(s => !s.completed);
            if (activeStage && activeStage.due === todayStr) {
              generatedAlerts.push({
                title: `📚 स्मार्ट रिवीजन अलर्ट: ${log.subject}`,
                text: `आपने पहले "${log.topic}" पढ़ा था। आज वैज्ञानिक अंतराल के अनुसार रिवीजन का समय है।`
              });
            }
          });

          if (generatedAlerts.length === 0) {
            generatedAlerts.push({
              title: "⚡ एकाग्रता सुधार गाइड",
              text: 'लगातार 45 मिनट से अधिक न पढ़ें। फोकस टाइमर टैब में जाकर 25 मिनट का एक सेशन अभी चालू करें!'
            });
          }

          setNotifications(generatedAlerts);
        }, [studyLogs]);

        const handleAddLog = (e) => {
          e.preventDefault();
          const finalSubject = newLog.subject === 'अन्य (Custom)' ? newLog.customSubject : newLog.subject;

          if (!finalSubject || !newLog.topic) {
            showAlert('⚠️ कृपया विषय और मुख्य टॉपिक का नाम दर्ज करें!');
            return;
          }

          const todayStr = new Date().toISOString().split('T')[0];
          let d1 = new Date(); d1.setDate(d1.getDate() + 1);
          let d2 = new Date(); d2.setDate(d2.getDate() + 3);
          let d3 = new Date(); d3.setDate(d3.getDate() + 7);
          let d4 = new Date(); d4.setDate(d4.getDate() + 15);

          const newEntry = {
            id: Date.now(),
            subject: finalSubject,
            topic: newLog.topic,
            date: todayStr,
            difficulty: newLog.difficulty,
            timeSpent: parseFloat(newLog.timeSpent) || 1,
            currentStage: 1,
            stages: [
              { name: 'R1 (24h)', due: d1.toISOString().split('T')[0], completed: false },
              { name: 'R2 (3d)', due: d2.toISOString().split('T')[0], completed: false },
              { name: 'R3 (7d)', due: d3.toISOString().split('T')[0], completed: false },
              { name: 'Test (15d)', due: d4.toISOString().split('T')[0], completed: false }
            ]
          };

          setStudyLogs([newEntry, ...studyLogs]);
          setUser(prev => ({ ...prev, points: prev.points + 50 }));
          showAlert('🚀 शानदार! पढ़ाई का ब्यौरा दर्ज हो गया। +50 XP!');
          setNewLog({ subject: '', customSubject: '', topic: '', difficulty: 'मध्यम (Medium)', timeSpent: 2 });
          setActiveTab('dashboard');
        };

        useEffect(() => {
          let interval = null;
          if (timer.isActive) {
            interval = setInterval(() => {
              if (timer.seconds > 0) {
                setTimer(prev => ({ ...prev, seconds: prev.seconds - 1 }));
              } else if (timer.seconds === 0 && timer.minutes > 0) {
                setTimer(prev => ({ ...prev, minutes: prev.minutes - 1, seconds: 59 }));
              } else {
                clearInterval(interval);
                const nextMode = timer.mode === 'Focus' ? 'Break' : 'Focus';
                setTimer({ minutes: nextMode === 'Focus' ? 25 : 5, seconds: 0, isActive: false, mode: nextMode });
                showAlert(`🔔 फोकस सत्र समाप्त!`);
              }
            }, 1000);
          } else {
            clearInterval(interval);
          }
          return () => clearInterval(interval);
        }, [timer.isActive, timer.seconds, timer.minutes]);

        const todayTotalAllocated = studyLogs.reduce((acc, log) => acc + (parseFloat(log.timeSpent) || 0), 0);
        const remainingTime = Math.max(0, user.availableHours - todayTotalAllocated);

        return (
          <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col justify-between items-center p-2 sm:p-4 w-full">
            <header className="w-full max-w-md text-center py-2">
              <h1 className="text-xl sm:text-2xl font-black text-indigo-400 flex items-center justify-center gap-2">
                🧠 सजग छात्र <span className="bg-gradient-to-r from-indigo-600 to-purple-600 text-[9px] text-white px-2 py-0.5 rounded-full font-bold">ULTIMATE v2.5</span>
              </h1>
              <p className="text-[10px] text-slate-400 mt-1">वैज्ञानिक 4-स्टेज रिवीजन ट्रैकर व फोकस टाइमर</p>
            </header>

            <div className="w-full max-w-md bg-slate-900 rounded-[32px] border-4 border-slate-800 shadow-2xl relative flex flex-col overflow-hidden h-[84vh] max-h-[790px]">
              {alertMsg && (
                <div className="absolute top-4 left-4 right-4 bg-indigo-600 text-white p-3 rounded-xl shadow-xl z-50 text-xs border border-indigo-400 animate-fadeIn">
                  <span>{alertMsg}</span>
                </div>
              )}

              <div className="bg-slate-950 text-[10px] px-6 pt-4 pb-2 text-slate-400 flex justify-between items-center border-b border-slate-800/40">
                <div>📱 app.pmevidya.com</div>
                <div className="flex items-center gap-1.5 font-semibold text-slate-300">
                  <span className="bg-indigo-900/40 border border-indigo-700/50 text-[9px] px-1.5 py-0.5 rounded text-indigo-300">🔥 {user.streak} दिन</span>
                  <span>⭐ {user.points} XP</span>
                </div>
              </div>

              <main className="flex-1 overflow-y-auto p-4 pb-16">
                {activeTab === 'dashboard' && (
                  <div className="space-y-4">
                    <div className="bg-gradient-to-br from-slate-900 to-indigo-950 p-4 rounded-2xl border border-indigo-900/40 space-y-3">
                      <div className="flex justify-between items-start">
                        <div>
                          <h2 className="text-xs text-indigo-300 font-bold uppercase tracking-wide">दैनिक अध्ययन समय बजट</h2>
                          <h3 className="text-lg font-black text-white mt-1">{todayTotalAllocated} / {user.availableHours} घंटे book हैं</h3>
                        </div>
                        <span className="bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] py-1 px-2 rounded-lg font-bold">
                          {remainingTime > 0 ? `${remainingTime}h उपलब्ध` : 'पूर्ण!'}
                        </span>
                      </div>
                      <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div className="bg-indigo-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (todayTotalAllocated / user.availableHours) * 100)}%` }}></div>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">📅 सक्रिय मेमोरी ट्रैकर</h3>
                      {studyLogs.map(log => (
                        <div key={log.id} className="bg-slate-950 p-3.5 rounded-xl border border-slate-800/80 space-y-2">
                          <span className="text-[9px] bg-indigo-950 border border-indigo-800 text-indigo-300 px-1.5 py-0.5 rounded font-bold uppercase">{log.subject}</span>
                          <h4 className="text-xs font-bold text-white mt-1">{log.topic}</h4>
                          <div className="grid grid-cols-4 gap-1.5 mt-2">
                            {log.stages.map((stage, idx) => (
                              <div key={idx} className={`text-[9px] p-1.5 rounded border text-center ${stage.completed ? 'bg-emerald-950 border-emerald-500 text-emerald-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>
                                {stage.name}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'log' && (
                  <form onSubmit={handleAddLog} className="space-y-4 text-xs">
                    <div>
                      <label className="block text-slate-300 font-semibold mb-1">विषय (Subject):</label>
                      <select value={newLog.subject} onChange={(e) => setNewLog({ ...newLog, subject: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200">
                        <option value="">-- चुनें --</option>
                        <option value="भौतिक विज्ञान (Physics)">भौतिक विज्ञान (Physics)</option>
                        <option value="रसायन विज्ञान (Chemistry)">रसायन विज्ञान (Chemistry)</option>
                        <option value="गणित (Maths)">गणित (Maths)</option>
                        <option value="इतिहास (History)">इतिहास (History)</option>
                        <option value="अन्य (Custom)">अन्य</option>
                      </select>
                    </div>
                    {newLog.subject === 'अन्य (Custom)' && (
                      <input type="text" placeholder="विषय नाम" value={newLog.customSubject} onChange={(e) => setNewLog({ ...newLog, customSubject: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200" />
                    )}
                    <div>
                      <label className="block text-slate-300 font-semibold mb-1">टॉपिक:</label>
                      <input type="text" placeholder="टॉपिक का नाम" value={newLog.topic} onChange={(e) => setNewLog({ ...newLog, topic: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200" />
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 font-bold py-3 rounded-xl shadow-lg text-white text-xs">🚀 सुरक्षित करें</button>
                  </form>
                )}

                {activeTab === 'timer' && (
                  <div className="space-y-6 flex flex-col items-center justify-center min-h-[350px]">
                    <div className="relative w-40 h-40 rounded-full border-4 border-indigo-500/20 flex flex-col items-center justify-center bg-slate-900">
                      <span className="text-[10px] font-bold text-indigo-300 uppercase">{timer.mode}</span>
                      <span className="text-3xl font-black text-white my-1 font-mono">{String(timer.minutes).padStart(2, '0')}:{String(timer.seconds).padStart(2, '0')}</span>
                    </div>
                    <div className="flex gap-3">
                      <button type="button" onClick={() => setTimer(prev => ({ ...prev, isActive: !prev.isActive }))} className={`px-6 py-2 rounded-full font-bold text-white text-xs ${timer.isActive ? 'bg-amber-600' : 'bg-emerald-600'}`}>
                        {timer.isActive ? '⏸ रोकें' : '▶ शुरू करें'}
                      </button>
                      <button type="button" onClick={() => setTimer({ minutes: timer.mode === 'Focus' ? 25 : 5, seconds: 0, isActive: false, mode: timer.mode })} className="bg-slate-800 border border-slate-700 text-slate-300 px-5 py-2 rounded-full text-xs">🔄 रीसेट</button>
                    </div>
                  </div>
                )}

                {activeTab === 'notifications' && (
                  <div className="space-y-3 text-xs">
                    {notifications.map((notif, idx) => (
                      <div key={idx} className="p-3 bg-indigo-950/25 border border-indigo-900/40 rounded-xl text-indigo-300">
                        <h4 className="font-bold text-white mb-0.5">{notif.title}</h4>
                        <p className="text-[11px] text-slate-300">{notif.text}</p>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === 'profile' && (
                  <div className="space-y-4 text-center">
                    <div className="w-16 h-16 rounded-full bg-indigo-500/10 border-2 border-indigo-500 flex items-center justify-center mx-auto mt-4 text-xl">👤</div>
                    <h3 className="text-sm font-bold text-white">{user.name}</h3>
                    <p className="text-[10px] text-slate-400">{user.category}</p>
                  </div>
                )}
              </main>

              <nav className="absolute bottom-0 left-0 right-0 h-14 bg-slate-950 border-t border-slate-800 flex justify-around items-center px-1 z-20">
                <button type="button" onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'dashboard' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><span className="text-sm">📖</span><span className="text-[8px] mt-0.5">ट्रैकर</span></button>
                <button type="button" onClick={() => setActiveTab('log')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'log' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><span className="text-sm">➕</span><span className="text-[8px] mt-0.5">दर्ज करें</span></button>
                <button type="button" onClick={() => setActiveTab('timer')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'timer' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><span className="text-sm">⏱</span><span className="text-[8px] mt-0.5">फोकस</span></button>
                <button type="button" onClick={() => setActiveTab('notifications')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'notifications' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><span className="text-sm">🔔</span><span className="text-[8px] mt-0.5">सुझाव</span></button>
                <button type="button" onClick={() => setActiveTab('profile')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'profile' ? 'text-indigo-400 font-bold' : 'text-slate-500'}`}><span className="text-sm">👤</span><span className="text-[8px] mt-0.5">प्रोफाइल</span></button>
              </nav>
            </div>
            <footer className="w-full max-w-md text-center py-2 text-[9px] text-slate-500">सजग छात्र v2.5 Ultimate</footer>
          </div>
        );
      }

      // CDN सेटअप के लिए सही React 18 रेंडरिंग मेथड
      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(React.createElement(App));
    </script>
</body>
</html>
