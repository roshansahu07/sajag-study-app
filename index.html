<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>सजग छात्र Ultimate v2.5</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>

    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

    from{
        opacity:0;

    }

        opacity:1;
        transform:translateY(0);
    }
}

}

    background:#4f46e5;

}

<body class="bg-slate-950 text-white antialiased transition-colors duration-300">

<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Service Worker -->
<script>
if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
        navigator.serviceWorker
        .register('./sw.js')
        .then(()=>console.log("Service Worker Registered"))
        .catch(err=>console.log(err));
    });

<script type="text/babel">

const {
    useState,
    useEffect
}=React;

/* -------------------------
   Translation Dictionary
------------------------- */

const t={
    hi:{
        title:"सजग छात्र",
        subtitle:"Scientific Revision Tracker",
        streak:"दिन",
        navTracker:"📖 ट्रैकर",
        navAdd:"➕ दर्ज करें",
        navFocus:"⏱ फोकस",
        navSuggest:"🔔 सुझाव",
        navInfo:"ℹ️ जानकारी",
        navProfile:"👤 प्रोफाइल"
    },

    en:{
        title:"Sajag Chhatra",
        subtitle:"Scientific Revision Tracker",
        streak:"Days",
        navTracker:"Tracker",
        navAdd:"Add",
        navFocus:"Focus",
        navSuggest:"Hints",
        navInfo:"Guide",
        navProfile:"Profile"
    }
};

/* -------------------------
      React App Starts
------------------------- */

function App(){

const [lang,setLang]=useState("hi");

const [isDarkMode,setIsDarkMode]=useState(true);

const [activeTab,setActiveTab]=useState("dashboard");

const [alertMsg,setAlertMsg]=useState(null);

const [showDueOnly,setShowDueOnly]=useState(false);

const [user,setUser]=useState({
    name:"रोशन लाल साहू",
    category:"Competitive Exams",
    availableHours:6,
    streak:5,
    points:350
});

/* -------------------------
   Study Logs
--------------------------*/

const [studyLogs, setStudyLogs] = useState(() => {
    const saved = localStorage.getItem("user_study_logs");

    if (saved) {
        return JSON.parse(saved);
    }

    return [
        {
            id: 1,
            subject: "Physics",
            topic: "Laws of Motion",
            date: new Date().toISOString().split("T")[0],
            difficulty: "Hard",
            timeSpent: 2,
            notes: "",
            currentStage: 0,

            stages: [
                {
                    name: "R1 (24h)",
                    due: new Date(Date.now() + 86400000)
                        .toISOString()
                        .split("T")[0],
                    completed: false
                },
                {
                    name: "R2 (3d)",
                    due: new Date(Date.now() + 3 * 86400000)
                        .toISOString()
                        .split("T")[0],
                    completed: false
                },
                {
                    name: "R3 (7d)",
                    due: new Date(Date.now() + 7 * 86400000)
                        .toISOString()
                        .split("T")[0],
                    completed: false
                },
                {
                    name: "R4 (15d)",
                    due: new Date(Date.now() + 15 * 86400000)
                        .toISOString()
                        .split("T")[0],
                    completed: false
                },
                {
                    name: "Mastery (30d)",
                    due: new Date(Date.now() + 30 * 86400000)
                        .toISOString()
                        .split("T")[0],
                    completed: false
                }
            ]
        }
    ];
});

/* -------------------------
   Auto Save
--------------------------*/

useEffect(() => {
    localStorage.setItem(
        "user_study_logs",
        JSON.stringify(studyLogs)
    );
}, [studyLogs]);

/* -------------------------
   New Log
--------------------------*/

const [newLog, setNewLog] = useState({
    subject: "",
    customSubject: "",
    topic: "",
    difficulty: "Medium",
    timeSpent: 2
});

/* -------------------------
   Timer
--------------------------*/

const [timer, setTimer] = useState({
    minutes: 25,
    seconds: 0,
    isActive: false,
    mode: "Focus"
});

/* -------------------------
   Notes
--------------------------*/

const [activeNotesLogId, setActiveNotesLogId] = useState(null);

const [tempNotesText, setTempNotesText] = useState("");

/* -------------------------
   Feynman
--------------------------*/

const [activeFeynmanLogId, setActiveFeynmanLogId] = useState(null);

const [feynmanText, setFeynmanText] = useState("");

const [feynmanEvaluation, setFeynmanEvaluation] = useState("");

const [loadingFeynman, setLoadingFeynman] = useState(false);

/* -------------------------
   Quiz
--------------------------*/

const [selectedTopicForTest, setSelectedTopicForTest] =
    useState(null);

const [loadingQuiz, setLoadingQuiz] =
    useState(false);

const [aiQuiz, setAiQuiz] =
    useState(null);

const [userAnswers, setUserAnswers] =
    useState({});

const [quizSubmitted, setQuizSubmitted] =
    useState(false);

/* -------------------------
   Notifications
--------------------------*/

const [notifications, setNotifications] =
    useState([]);

/* -------------------------
   API Key
--------------------------*/

const [inputApiKey, setInputApiKey] =
    useState(
        localStorage.getItem("user_gemini_key") || ""
    );

/* -------------------------
   FIX 1
   calculatedLevel
--------------------------*/

const calculatedLevel =
    Math.max(
        1,
        Math.floor(user.points / 100) + 1
    );

/* -------------------------
   FIX 2
   Achievements
--------------------------*/

const achievementsList = [

{
    name:"🥉 Beginner",
    desc:"100 XP Complete",
    unlocked:user.points>=100
},

{
    name:"🥈 Learner",
    desc:"250 XP Complete",
    unlocked:user.points>=250
},

{
    name:"🥇 Expert",
    desc:"500 XP Complete",
    unlocked:user.points>=500
},

{
    name:"🏆 Master",
    desc:"1000 XP Complete",
    unlocked:user.points>=1000
}

];

/* -------------------------
   Alert
--------------------------*/

const showAlert=(msg)=>{

    setAlertMsg(msg);

    setTimeout(()=>{

        setAlertMsg(null);

    },3000);

};


/* -------------------------
   Save Gemini API Key
--------------------------*/

const handleSaveKey = () => {
    localStorage.setItem("user_gemini_key", inputApiKey.trim());
    showAlert("✅ API Key Saved");
};

/* -------------------------
   Export Backup
--------------------------*/

const handleExportData = () => {

    const backup = {
        user,
        studyLogs
    };

    const blob = new Blob(
        [JSON.stringify(backup, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "sajag_backup.json";
    a.click();

    URL.revokeObjectURL(url);

    showAlert("📤 Backup Downloaded");

};

/* -------------------------
   Import Backup
--------------------------*/

const handleImportData = (e) => {

    const file = e.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = (event) => {

        try {

            const data = JSON.parse(event.target.result);

            if (data.user)
                setUser(data.user);

            if (Array.isArray(data.studyLogs))
                setStudyLogs(data.studyLogs);

            showAlert("✅ Backup Restored");

        } catch {

            showAlert("❌ Invalid Backup File");

        }

    };

    reader.readAsText(file);

};

/* -------------------------
   Add Study Log
--------------------------*/

const handleAddLog = (e) => {

    e.preventDefault();

    const subject =
        newLog.subject === "Custom"
            ? newLog.customSubject
            : newLog.subject;

    if (!subject || !newLog.topic) {

        showAlert("Fill all fields");

        return;

    }

    const today = new Date();

    const due = days =>
        new Date(
            today.getTime() +
            days * 24 * 60 * 60 * 1000
        )
            .toISOString()
            .split("T")[0];

    const log = {

        id: Date.now(),

        subject,

        topic: newLog.topic,

        difficulty: newLog.difficulty,

        date: due(0),

        notes: "",

        timeSpent: Number(newLog.timeSpent),

        currentStage: 0,

        stages: [

            {
                name: "R1 (24h)",
                due: due(1),
                completed: false
            },

            {
                name: "R2 (3d)",
                due: due(3),
                completed: false
            },

            {
                name: "R3 (7d)",
                due: due(7),
                completed: false
            },

            {
                name: "R4 (15d)",
                due: due(15),
                completed: false
            },

            {
                name: "Mastery (30d)",
                due: due(30),
                completed: false
            }

        ]

    };

    setStudyLogs(prev => [log, ...prev]);

    setNewLog({

        subject: "",

        customSubject: "",

        topic: "",

        difficulty: "Medium",

        timeSpent: 2

    });

    setUser(prev => ({
        ...prev,
        points: prev.points + 10
    }));

    showAlert("✅ Study Saved");

    setActiveTab("dashboard");

};

/* -------------------------
   Complete Next Stage
--------------------------*/

const handleMarkNextStage = (id) => {

    setStudyLogs(prev =>
        prev.map(log => {

            if (log.id !== id)
                return log;

            const stages = [...log.stages];

            const next =
                stages.findIndex(
                    s => !s.completed
                );

            if (next !== -1) {

                stages[next].completed = true;

                setUser(u => ({
                    ...u,
                    points: u.points + 20
                }));

                showAlert(
                    "🎉 Stage Completed"
                );

            }

            return {

                ...log,

                currentStage: next + 1,

                stages

            };

        })
    );

};

/* -------------------------
   Reset Revision Cycle
--------------------------*/

const handleResetRevisionCycle = (id) => {

    const today = new Date();

    const due = d =>
        new Date(
            today.getTime() +
            d * 86400000
        )
            .toISOString()
            .split("T")[0];

    setStudyLogs(prev =>
        prev.map(log => {

            if (log.id !== id)
                return log;

            return {

                ...log,

                currentStage: 0,

                stages: [

                    {
                        name: "R1 (24h)",
                        due: due(1),
                        completed: false
                    },

                    {
                        name: "R2 (3d)",
                        due: due(3),
                        completed: false
                    },

                    {
                        name: "R3 (7d)",
                        due: due(7),
                        completed: false
                    },

                    {
                        name: "R4 (15d)",
                        due: due(15),
                        completed: false
                    },

                    {
                        name: "Mastery (30d)",
                        due: due(30),
                        completed: false
                    }

                ]

            };

        })
    );

    showAlert("🔄 Cycle Reset");

};


/* -------------------------
   Pomodoro Timer
--------------------------*/

useEffect(() => {

    let interval = null;

    if (timer.isActive) {

        interval = setInterval(() => {

            setTimer(prev => {

                if (prev.seconds > 0) {
                    return {
                        ...prev,
                        seconds: prev.seconds - 1
                    };
                }

                if (prev.minutes > 0) {
                    return {
                        ...prev,
                        minutes: prev.minutes - 1,
                        seconds: 59
                    };
                }

                clearInterval(interval);

                showAlert("⏰ Focus Session Completed!");

                return {
                    ...prev,
                    isActive: false,
                    minutes: 25,
                    seconds: 0
                };

            });

        }, 1000);

    }

    return () => clearInterval(interval);

}, [timer.isActive]);



/* -------------------------
   Today's Notifications
--------------------------*/

useEffect(() => {

    const today =
        new Date().toISOString().split("T")[0];

    const list = [];

    studyLogs.forEach(log => {

        const due = log.stages.find(
            s => !s.completed && s.due === today
        );

        if (due) {

            list.push({

                title: "📚 Revision Due",

                text:
                    log.subject +
                    " • " +
                    log.topic

            });

        }

    });

    if (!list.length) {

        list.push({

            title: "🎯 Great!",

            text:
                "No revision pending today."

        });

    }

    setNotifications(list);

}, [studyLogs]);



/* -------------------------
   Open Notes
--------------------------*/

const handleOpenNotes = log => {

    setActiveNotesLogId(log.id);

    setTempNotesText(log.notes || "");

};



/* -------------------------
   Save Notes
--------------------------*/

const handleSaveNotes = () => {

    setStudyLogs(prev =>

        prev.map(log =>

            log.id === activeNotesLogId

                ? {

                      ...log,

                      notes: tempNotesText

                  }

                : log

        )

    );

    setActiveNotesLogId(null);

    showAlert("📝 Notes Saved");

};



/* -------------------------
   Feynman Verify
--------------------------*/

const handleFeynmanVerify = async log => {

    const key =
        localStorage.getItem("user_gemini_key");

    if (!key) {

        showAlert("Enter Gemini API Key");

        return;

    }

    if (!feynmanText.trim()) return;

    setLoadingFeynman(true);

    setFeynmanEvaluation("");

    try {

        const response = await fetch(

            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,

            {

                method: "POST",

                headers: {

                    "Content-Type":
                        "application/json"

                },

                body: JSON.stringify({

                    contents: [

                        {

                            parts: [

                                {

                                    text:

`Evaluate this explanation.

Subject:
${log.subject}

Topic:
${log.topic}

Student Answer:
${feynmanText}

Give mistakes and suggestions in simple language.`

                                }

                            ]

                        }

                    ]

                })

            }

        );

        const data = await response.json();

        setFeynmanEvaluation(

            data.candidates?.[0]?.content
                ?.parts?.[0]?.text ||

                "No response."

        );

    } catch {

        setFeynmanEvaluation(

            "❌ AI Connection Failed"

        );

    }

    setLoadingFeynman(false);

};



/* -------------------------
   Generate AI Quiz
--------------------------*/

const handleGenerateQuiz = async log => {

    const key =
        localStorage.getItem("user_gemini_key");

    if (!key) {

        showAlert("Save Gemini API Key");

        return;

    }

    setLoadingQuiz(true);

    setActiveTab("test-arena");

    try {

        const response = await fetch(

            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,

            {

                method: "POST",

                headers: {

                    "Content-Type":
                        "application/json"

                },

                body: JSON.stringify({

                    generationConfig: {

                        responseMimeType:
                            "application/json"

                    },

                    contents: [

                        {

                            parts: [

                                {

                                    text:

`Create 3 MCQs in JSON.

Subject:
${log.subject}

Topic:
${log.topic}

Return:
{
questions:[
{
question:"",
options:[],
correctIndex:0,
explanation:""
}
]
}`

                                }

                            ]

                        }

                    ]

                })

            }

        );

        const data = await response.json();

        const text =
            data.candidates?.[0]?.content
                ?.parts?.[0]?.text;

        if (text) {

            const parsed = JSON.parse(text);

            setAiQuiz(parsed.questions);

            setSelectedTopicForTest(log);

        }

    } catch {

        showAlert("Quiz Generation Failed");

    }

    setLoadingQuiz(false);

};



/* -------------------------
   Submit Quiz
--------------------------*/

const handleSubmitQuiz = () => {

    if (!aiQuiz) return;

    let score = 0;

    aiQuiz.forEach((q, i) => {

        if (userAnswers[i] === q.correctIndex)

            score++;

    });

    setQuizSubmitted(true);

    setUser(prev => ({

        ...prev,

        points:

            prev.points + score * 20,

        streak: prev.streak + 1

    }));

    showAlert(

        `🎉 Score : ${score}/${aiQuiz.length}`

    );

};



/* -------------------------
   Render UI
--------------------------*/

const todayTotalAllocated = studyLogs.reduce(
    (sum, log) => sum + Number(log.timeSpent || 0),
    0
);

const remainingTime = Math.max(
    0,
    user.availableHours - todayTotalAllocated
);

const todayStr =
    new Date().toISOString().split("T")[0];

return (

<div className="min-h-screen flex flex-col max-w-md mx-auto">

{/* Header */}

<header className="flex justify-between items-center p-3 border-b border-slate-800">

<div>

<h1 className="text-xl font-black text-indigo-400">
🧠 {t[lang].title}
</h1>

<p className="text-[10px] text-slate-500">
{t[lang].subtitle}
</p>

</div>

<div className="flex gap-2">

<button
onClick={() =>
setIsDarkMode(!isDarkMode)
}
className="bg-slate-800 px-2 py-1 rounded-lg text-xs">

{isDarkMode ? "☀️" : "🌙"}

</button>

<button
onClick={() =>
setLang(lang==="hi"?"en":"hi")
}
className="bg-indigo-600 px-2 py-1 rounded-lg text-xs">

{lang==="hi"?"EN":"HI"}

</button>

</div>

</header>

{/* Dashboard */}

{activeTab==="dashboard" && (

<div className="space-y-4 p-3">

{/* User Card */}

<div className="bg-slate-900 rounded-2xl p-4 border border-slate-800">

<div className="flex justify-between">

<div>

<h3 className="font-bold">

{user.name}

</h3>

<p className="text-xs text-slate-400">

{user.category}

</p>

</div>

<div className="text-right">

<div className="text-indigo-400 font-bold">

⭐ {user.points} XP

</div>

<div className="text-xs">

🔥 {user.streak} {t[lang].streak}

</div>

<div className="text-xs">

🏆 Level {calculatedLevel}

</div>

</div>

</div>

</div>

{/* Time Budget */}

<div className="bg-slate-900 rounded-2xl p-4 border border-slate-800">

<h3 className="font-bold text-indigo-400 mb-3">

📊 Today's Study Budget

</h3>

<div className="flex justify-between text-sm">

<span>

Booked

</span>

<span>

{todayTotalAllocated} / {user.availableHours} hrs

</span>

</div>

<div className="w-full h-3 bg-slate-800 rounded-full mt-3">

<div

className="h-full bg-indigo-500 rounded-full"

style={{

width:
`${Math.min(
100,
(todayTotalAllocated/user.availableHours)*100
)}%`

}}

>

</div>

</div>

<p className="text-xs mt-2 text-slate-400">

Remaining :

{remainingTime} Hours

</p>

</div>

{/* Weekly Analytics */}

<div className="bg-slate-900 rounded-2xl p-4 border border-slate-800">

<h3 className="font-bold text-indigo-400 mb-4">

📈 Weekly Analytics

</h3>

<div className="flex justify-between items-end h-24">

{[
4,
5,
todayTotalAllocated||2,
3,
5,
2,
1

].map((h,index)=>(

<div
key={index}
className="flex flex-col items-center gap-1">

<div

className="bg-indigo-500 rounded-t w-5"

style={{

height:`${h*10}px`

}}

></div>

<span className="text-[10px]">

{"SMTWTFS"[index]}

</span>

</div>

))}

</div>

</div>

{/* Due Filter */}

<label className="flex items-center gap-2 text-xs">

<input

type="checkbox"

checked={showDueOnly}

onChange={()=>
setShowDueOnly(!showDueOnly)
}

/>

Show Due Only

</label>

{/* Revision Tracker */}

<div className="space-y-3">

<h3 className="font-bold text-indigo-400">

📚 Revision Tracker

</h3>

{studyLogs

.filter(log=>

!showDueOnly ||

log.stages.some(

s=>!s.completed && s.due===todayStr

)

)

.map(log=>(

<div

key={log.id}

className="bg-slate-900 rounded-2xl border border-slate-800 p-4 space-y-3">

<div>

<span className="text-[10px] bg-indigo-700 px-2 py-1 rounded">

{log.subject}

</span>

<h3 className="font-bold mt-2">

{log.topic}

</h3>

</div>


{/* Notes */}
{log.notes && activeNotesLogId !== log.id && (
    <div className="bg-slate-950 border border-slate-800 rounded-xl p-2 text-[11px] text-slate-300">
        📝 {log.notes}
    </div>
)}

{activeNotesLogId === log.id && (
    <div className="space-y-2">

        <textarea
            value={tempNotesText}
            onChange={(e)=>setTempNotesText(e.target.value)}
            className="w-full h-20 bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs"
            placeholder="Write Notes..."
        />

        <button
            onClick={handleSaveNotes}
            className="bg-emerald-600 px-3 py-2 rounded-xl text-xs font-bold">

            💾 Save Notes

        </button>

    </div>
)}

{/* Feynman */}

{activeFeynmanLogId===log.id && (

<div className="space-y-2">

<textarea

value={feynmanText}

onChange={(e)=>setFeynmanText(e.target.value)}

placeholder="Explain this topic in your own words..."

className="w-full h-24 bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs"

/>

<button

onClick={()=>handleFeynmanVerify(log)}

className="bg-purple-600 px-3 py-2 rounded-xl text-xs font-bold">

{loadingFeynman ? "Checking..." : "🧠 Verify"}

</button>

{feynmanEvaluation && (

<div className="bg-slate-950 border border-purple-700 rounded-xl p-3 text-xs whitespace-pre-wrap">

{feynmanEvaluation}

</div>

)}

</div>

)}

{/* Revision Stages */}

<div className="grid grid-cols-5 gap-1">

{log.stages.map((stage,index)=>(

<div

key={index}

className={`text-center rounded-lg p-1 text-[9px] border

${stage.completed

? "bg-emerald-700 border-emerald-500"

: "bg-slate-800 border-slate-700"

}`}

>

<div>

{stage.name}

</div>

<div className="text-[8px] mt-1">

{stage.due}

</div>

</div>

))}

</div>

{/* Buttons */}

<div className="grid grid-cols-2 gap-2">

<button

onClick={()=>handleMarkNextStage(log.id)}

className="bg-emerald-600 hover:bg-emerald-700 rounded-xl py-2 text-xs font-bold">

✅ Complete Stage

</button>

<button

onClick={()=>handleResetRevisionCycle(log.id)}

className="bg-rose-600 hover:bg-rose-700 rounded-xl py-2 text-xs font-bold">

🔄 Reset Cycle

</button>

</div>

<div className="grid grid-cols-3 gap-2">

<button

onClick={()=>handleOpenNotes(log)}

className="bg-slate-800 rounded-xl py-2 text-[10px]">

📝 Notes

</button>

<button

onClick={()=>{

setActiveFeynmanLogId(

activeFeynmanLogId===log.id

? null

: log.id

);

}}

className="bg-purple-700 rounded-xl py-2 text-[10px]">

🧠 Feynman

</button>

<button

onClick={()=>handleGenerateQuiz(log)}

className="bg-indigo-600 rounded-xl py-2 text-[10px]">

🤖 AI Test

</button>

</div>

</div>

))

}

</div>

</div>

)}


{/* ===========================
    ADD STUDY LOG PAGE
=========================== */}

{activeTab === "log" && (

<div className="p-4 space-y-4">

<h2 className="text-lg font-bold text-indigo-400">
➕ Add Study Log
</h2>

<form
onSubmit={handleAddLog}
className="space-y-3">

<select
value={newLog.subject}
onChange={(e)=>
setNewLog({
...newLog,
subject:e.target.value
})
}
className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700">

<option value="">
Select Subject
</option>

<option value="Physics">
Physics
</option>

<option value="Chemistry">
Chemistry
</option>

<option value="Maths">
Maths
</option>

<option value="Biology">
Biology
</option>

<option value="History">
History
</option>

<option value="Geography">
Geography
</option>

<option value="Custom">
Custom
</option>

</select>

{newLog.subject==="Custom" && (

<input

type="text"

placeholder="Subject Name"

value={newLog.customSubject}

onChange={(e)=>

setNewLog({

...newLog,

customSubject:e.target.value

})

}

className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"

/>

)}

<input

type="text"

placeholder="Topic"

value={newLog.topic}

onChange={(e)=>

setNewLog({

...newLog,

topic:e.target.value

})

}

className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"

/>

<select

value={newLog.difficulty}

onChange={(e)=>

setNewLog({

...newLog,

difficulty:e.target.value

})

}

className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700">

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

</select>

<input

type="number"

step="0.5"

min="0.5"

placeholder="Hours"

value={newLog.timeSpent}

onChange={(e)=>

setNewLog({

...newLog,

timeSpent:e.target.value

})

}

className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"

/>

<button

type="submit"

className="w-full bg-indigo-600 hover:bg-indigo-700 rounded-xl py-3 font-bold">

🚀 Save Study

</button>

</form>

</div>

)}

{/* ===========================
      TIMER PAGE
=========================== */}

{activeTab==="timer" && (

<div className="flex flex-col items-center justify-center p-6 space-y-6">

<h2 className="text-xl font-bold text-indigo-400">

⏱ Pomodoro Timer

</h2>

<div className="text-6xl font-black font-mono">

{String(timer.minutes).padStart(2,"0")}:

{String(timer.seconds).padStart(2,"0")}

</div>

<div className="flex gap-3">

<button

onClick={()=>

setTimer({

...timer,

isActive:!timer.isActive

})

}

className="bg-indigo-600 px-5 py-3 rounded-xl">

{timer.isActive?"Pause":"Start"}

</button>

<button

onClick={()=>{

setTimer({

minutes:25,

seconds:0,

isActive:false,

mode:"Focus"

});

}}

className="bg-slate-800 px-5 py-3 rounded-xl">

Reset

</button>

</div>

</div>

)}

{/* ===========================
        AI TEST PAGE
=========================== */}

{activeTab==="test-arena" && (

<div className="p-4 space-y-5">

<h2 className="text-lg font-bold text-indigo-400">

🤖 AI Test

</h2>

{loadingQuiz && (

<div className="text-center">

Generating Questions...

</div>

)}

{!loadingQuiz && aiQuiz && (

<>

{aiQuiz.map((q,index)=>(

<div

key={index}

className="bg-slate-900 border border-slate-700 rounded-xl p-4 space-y-3">

<h3 className="font-bold">

{index+1}. {q.question}

</h3>

{q.options.map((opt,optIndex)=>(

<label

key={optIndex}

className="flex gap-2 cursor-pointer">

<input

type="radio"

name={"q"+index}

checked={

userAnswers[index]===optIndex

}

onChange={()=>

setUserAnswers({

...userAnswers,

[index]:optIndex

})

}

/>

<span>

{opt}

</span>

</label>

))}

{quizSubmitted && (

<div className="text-xs text-indigo-300">

💡 {q.explanation}

</div>

)}

</div>

))}

<button

onClick={handleSubmitQuiz}

className="w-full bg-emerald-600 rounded-xl py-3 font-bold">

Submit Test

</button>

</>

)}

</div>

)}

{/* ===========================
      NOTIFICATIONS PAGE
=========================== */}

{activeTab==="notifications" && (

<div className="p-4 space-y-3">

<h2 className="text-lg font-bold text-indigo-400">

🔔 Notifications

</h2>

{notifications.map((item,index)=>(

<div

key={index}

className="bg-slate-900 border border-slate-800 rounded-xl p-3">

<h3 className="font-semibold">

{item.title}

</h3>

<p className="text-sm text-slate-400 mt-1">

{item.text}

</p>

</div>

))}

</div>

)}


{/* ===========================
        PROFILE PAGE
=========================== */}

{activeTab === "profile" && (

<div className="p-4 space-y-4">

<h2 className="text-xl font-bold text-indigo-400">
👤 Profile
</h2>

<div className="bg-slate-900 rounded-xl border border-slate-700 p-4">

<p><b>Name:</b> {user.name}</p>
<p><b>Category:</b> {user.category}</p>
<p><b>🔥 Streak:</b> {user.streak}</p>
<p><b>⭐ XP:</b> {user.points}</p>
<p><b>🏆 Level:</b> {calculatedLevel}</p>

</div>

<div className="bg-slate-900 rounded-xl border border-slate-700 p-4">

<h3 className="font-bold mb-3">
🏅 Achievements
</h3>

{achievementsList.map((a,i)=>(

<div
key={i}
className="flex justify-between py-2 border-b border-slate-800">

<span>{a.name}</span>

<span>

{a.unlocked ? "✅" : "🔒"}

</span>

</div>

))}

</div>

<div className="bg-slate-900 rounded-xl border border-slate-700 p-4 space-y-3">

<h3 className="font-bold">
🤖 Gemini API Key
</h3>

<input
type="password"
value={inputApiKey}
onChange={(e)=>setInputApiKey(e.target.value)}
placeholder="Paste API Key"
className="w-full p-3 rounded-xl bg-slate-950 border border-slate-700"
/>

<button
onClick={handleSaveKey}
className="w-full bg-indigo-600 rounded-xl py-3">

Save API Key

</button>

</div>

<div className="grid grid-cols-2 gap-3">

<button
onClick={handleExportData}
className="bg-indigo-600 rounded-xl py-3">

📤 Export

</button>

<label className="bg-slate-800 rounded-xl py-3 text-center cursor-pointer">

📥 Import

<input
type="file"
accept=".json"
hidden
onChange={handleImportData}
/>

</label>

</div>

</div>

)}

{/* ===========================
        INFO PAGE
=========================== */}

{activeTab==="info" && (

<div className="p-4 space-y-4">

<h2 className="text-xl font-bold text-indigo-400">

ℹ️ About Sajag Chhatra

</h2>

<div className="bg-slate-900 rounded-xl p-4 border border-slate-700 text-sm leading-7">

<p>✅ Scientific Spaced Repetition</p>

<p>✅ Pomodoro Focus Timer</p>

<p>✅ AI Quiz Generator</p>

<p>✅ Feynman Learning</p>

<p>✅ Offline Backup</p>

<p>✅ Progressive Web App</p>

<p>✅ Mobile Optimized</p>

</div>

</div>

)}

{/* Alert */}

{alertMsg && (

<div className="fixed top-4 left-1/2 -translate-x-1/2 bg-indigo-600 px-4 py-2 rounded-xl shadow-xl z-50">

{alertMsg}

</div>

)}

{/* ===========================
      Bottom Navigation
=========================== */}

<nav className="fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-800 flex justify-around py-2">

<button onClick={()=>setActiveTab("dashboard")}>
📖
</button>

<button onClick={()=>setActiveTab("log")}>
➕
</button>

<button onClick={()=>setActiveTab("timer")}>
⏱
</button>

<button onClick={()=>setActiveTab("notifications")}>
🔔
</button>

<button onClick={()=>setActiveTab("info")}>
ℹ️
</button>

<button onClick={()=>setActiveTab("profile")}>
👤
</button>

</nav>

</div>

);

}

/* ===========================
      Render App
=========================== */

ReactDOM
.createRoot(
document.getElementById("root")
)
.render(<App />);

</script>

</body>

</html>
