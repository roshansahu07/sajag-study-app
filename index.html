<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजग छात्र Ultimate</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
        const [showDueOnly, setShowDueOnly] = useState(false);
        const [studyLogs, setStudyLogs] = useState(() => {
          const saved = localStorage.getItem('user_study_logs');
          return saved ? JSON.parse(saved) : [
            {
              id: 1, subject: 'भौतिक विज्ञान (Physics)', topic: 'घर्षण और गति के नियम',
              stages: [
                { name: 'R1', due: new Date().toISOString().split('T')[0], completed: false },
                { name: 'R2', due: new Date(Date.now() + 3*24*60*60*1000).toISOString().split('T')[0], completed: false },
                { name: 'R3', due: new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0], completed: false },
                { name: 'R4', due: new Date(Date.now() + 15*24*60*60*1000).toISOString().split('T')[0], completed: false },
                { name: 'Mastery', due: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0], completed: false }
              ]
            }
          ];
        });

        const markStageDone = (id) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === id) {
              const stages = log.stages.map(s => !s.completed ? { ...s, completed: true } : s);
              return { ...log, stages };
            }
            return log;
          }));
        };

        const resetCycle = (id) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === id) {
              const stages = log.stages.map(s => ({ ...s, completed: false }));
              return { ...log, stages };
            }
            return log;
          }));
        };

        useEffect(() => {
          localStorage.setItem('user_study_logs', JSON.stringify(studyLogs));
        }, [studyLogs]);

        const todayStr = new Date().toISOString().split('T')[0];

        return (
          <div className="min-h-screen flex flex-col justify-between items-center p-4 w-full">
            <header className="w-full max-w-md flex justify-between items-center py-2">
              <div>
                <h1 className="text-xl font-black text-indigo-500">🧠 सजग छात्र Ultimate</h1>
                <p className="text-[10px] text-slate-400">वैज्ञानिक 5-स्टेज मेमोरी ट्रैकर</p>
              </div>
              <a href="./features.html" className="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-xl font-bold transition">⏱️ अन्य फीचर्स</a>
            </header>

            <div className="w-full max-w-md rounded-[32px] border-4 border-slate-800 bg-slate-900 p-4 shadow-2xl h-[74vh] overflow-y-auto">
              <div className="flex items-center gap-2 text-xs font-bold text-slate-400 mb-4">
                <input type="checkbox" checked={showDueOnly} onChange={() => setShowDueOnly(!showDueOnly)} className="w-4 h-4 accent-indigo-600 rounded" />
                <label>केवल आज का आवश्यक रिवीजन दिखाएं (Due Today)</label>
              </div>

              <div className="space-y-3">
                {studyLogs
                  .filter(log => !showDueOnly || log.stages.some(s => s.due === todayStr && !s.completed))
                  .map(log => (
                    <div key={log.id} className="p-3.5 rounded-xl bg-slate-950 border border-slate-800 space-y-3">
                      <div>
                        <span className="text-[9px] bg-indigo-500/10 text-indigo-400 px-1.5 py-0.5 rounded font-bold uppercase">{log.subject}</span>
                        <h4 className="text-xs font-bold mt-1 text-white">{log.topic}</h4>
                      </div>
                      <div className="grid grid-cols-5 gap-1">
                        {log.stages.map((stage, idx) => (
                          <div key={idx} className={`text-[8px] p-1 rounded border text-center font-bold ${stage.completed ? 'bg-emerald-500/10 border-emerald-500/40 text-emerald-500' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>
                            {stage.name}
                          </div>
                        ))}
                      </div>
                      <div className="flex gap-2 pt-1 border-t border-slate-800/40">
                        <button onClick={() => markStageDone(log.id)} className="flex-1 bg-emerald-600/10 border border-emerald-500/30 text-emerald-400 text-[10px] py-1.5 rounded-lg font-bold">
                          ✅ स्टेज पूर्ण
                        </button>
                        <button onClick={() => resetCycle(log.id)} className="flex-1 bg-rose-600/10 border border-rose-500/30 text-rose-400 text-[10px] py-1.5 rounded-lg font-bold">
                          🔄 रीसेट चक्र
                        </button>
                      </div>
                    </div>
                ))}
              </div>
            </div>
            <footer className="text-[10px] text-slate-500 text-center">app.pmevidya.com</footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
