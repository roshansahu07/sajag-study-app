<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>सजग छात्र Ultimate</title>
    
    <!-- PWA Manifest Link -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="transition-colors duration-300 antialiased">
    <div id="root"></div>

    <!-- React, ReactDOM, and Babel Packages -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Service Worker Script -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
      }
    </script>

    <!-- Main React Application -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      // ट्रांसलेशन डिक्शनरी
      const t = {
        hi: {
          title: "सजग छात्र",
          subtitle: "वैज्ञानिक 5-स्टेज रिवीजन ट्रैकर व फोकस टाइमर",
          streak: "दिन",
          hoursBooked: "घंटे बुक हैं",
          budgetTitle: "दैनिक अध्ययन समय बजट",
          trackerTitle: "📅 सक्रिय मेमोरी ट्रैकर",
          aiTestBtn: "🤖 AI टेस्ट",
          addLogTitle: "🚀 आज जो पढ़ा, उसे दर्ज करें",
          labelSubject: "विषय (Subject):",
          selectOpt: "-- चुनें --",
          labelTopic: "टॉपिक (Topic Name):",
          labelTime: "समय (घंटे):",
          btnSave: "🚀 सुरक्षित करें",
          customTimerLabel: "कस्टम फोकस समय (मिनट):",
          btnStart: "▶ शुरू करें",
          btnPause: "⏸ रोकें",
          navTracker: "📖 ट्रैकर",
          navAdd: "➕ दर्ज",
          navFocus: "⏱ फोकस",
          navProfile: "👤 प्रोफाइल",
          backupTitle: "💾 डेटा बैकअप व सुरक्षा",
          btnExport: "📤 बैकअप डाउनलोड",
          btnImport: "📥 बैकअप अपलोड",
          aiSettings: "🤖 Gemini AI Key विन्यास",
          btnSaveKey: "💾 Key सुरक्षित करें",
          analyticsTitle: "📊 साप्ताहिक अध्ययन विश्लेषण",
          saveNotesBtn: "💾 सेव करें",
          levelText: "अध्ययन स्तर",
          notesPlaceholder: "सूत्र या मुख्य बिंदु लिखें...",
          dueOnly: "केवल आज का आवश्यक रिवीजन दिखाएं (Due Today)",
          feynmanBtn: "🗣️ फेनमैन मोड",
          verifyFeynman: "✅ AI से जांचें",
          feynmanPlaceholder: "इस टॉपिक को अपनी सरल भाषा में समझाएं...",
          resetCycle: "🔄 रीसेट चक्र"
        },
        en: {
          title: "Sajag Chhatra",
          subtitle: "Scientific 5-Stage Revision Tracker & Focus Timer",
          streak: "Days",
          hoursBooked: "Hours Booked",
          budgetTitle: "Daily Study Budget",
          trackerTitle: "📅 Active Memory Tracker",
          aiTestBtn: "🤖 AI Test",
          addLogTitle: "🚀 Log Today's Study",
          labelSubject: "Subject:",
          selectOpt: "-- Select --",
          labelTopic: "Topic Name:",
          labelTime: "Time (Hours):",
          btnSave: "🚀 Save Details",
          customTimerLabel: "Custom Focus Time (Mins):",
          btnStart: "▶ Start",
          btnPause: "⏸ Pause",
          navTracker: "📖 Tracker",
          navAdd: "➕ Add",
          navFocus: "⏱ Focus",
          navProfile: "👤 Profile",
          backupTitle: "Data Backup & Safety",
          btnExport: "📤 Download Backup",
          btnImport: "📥 Upload Backup",
          aiSettings: "🤖 Gemini AI Key Settings",
          btnSaveKey: "💾 Save Key",
          analyticsTitle: "📊 Weekly Study Analytics",
          saveNotesBtn: "💾 Save Notes",
          levelText: "Level",
          notesPlaceholder: "Write key formulas or main points...",
          dueOnly: "Show Due Revisions Only",
          feynmanBtn: "🗣️ Feynman Mode",
          verifyFeynman: "✅ Verify with AI",
          feynmanPlaceholder: "Explain this topic in simple words...",
          resetCycle: "🔄 Reset Cycle"
        }
      };

      function App() {
        const [lang, setLang] = useState('hi');
        const [isDarkMode, setIsDarkMode] = useState(true);
        const [showDueOnly, setShowDueOnly] = useState(false);
        const [activeTab, setActiveTab] = useState('dashboard');
        const [alertMsg, setAlertMsg] = useState(null);

        const [user, setUser] = useState({
          name: 'रोशन लाल साहू',
          category: 'प्रतियोगी परीक्षा (Competitive Exams)',
          availableHours: 6,
          streak: 5,
          points: 350
        });

        const [studyLogs, setStudyLogs] = useState(() => {
          try {
            const saved = localStorage.getItem('user_study_logs');
            return saved ? JSON.parse(saved) : [
              {
                id: 1,
                subject: 'भौतिक विज्ञान (Physics)',
                topic: 'घर्षण और गति के नियम (Friction & Laws of Motion)',
                timeSpent: 2,
                notes: 'F = ma, घर्षण बल = uN',
                stages: [
                  { name: 'R1 (24h)', due: new Date().toISOString().split('T')[0], completed: true },
                  { name: 'R2 (3d)', due: new Date(Date.now() + 2*24*60*60*1000).toISOString().split('T')[0], completed: false },
                  { name: 'R3 (7d)', due: new Date(Date.now() + 6*24*60*60*1000).toISOString().split('T')[0], completed: false },
                  { name: 'R4 (15d)', due: new Date(Date.now() + 14*24*60*60*1000).toISOString().split('T')[0], completed: false },
                  { name: 'Mastery', due: new Date(Date.now() + 29*24*60*60*1000).toISOString().split('T')[0], completed: false }
                ]
              }
            ];
          } catch (e) { return []; }
        });

        useEffect(() => {
          localStorage.setItem('user_study_logs', JSON.stringify(studyLogs));
        }, [studyLogs]);

        useEffect(() => {
          document.body.className = isDarkMode ? "bg-slate-950 text-slate-100" : "bg-slate-100 text-slate-900";
        }, [isDarkMode]);

        const [newLog, setNewLog] = useState({ subject: '', customSubject: '', topic: '', timeSpent: 2 });
        const [timer, setTimer] = useState({ minutes: 25, seconds: 0, isActive: false });
        const [inputApiKey, setInputApiKey] = useState(localStorage.getItem('user_gemini_key') || '');
        const [activeNotesLogId, setActiveNotesLogId] = useState(null);
        const [tempNotesText, setTempNotesText] = useState('');
        const [activeFeynmanLogId, setActiveFeynmanLogId] = useState(null);
        const [feynmanText, setFeynmanText] = useState('');
        const [feynmanEvaluation, setFeynmanEvaluation] = useState('');
        const [loadingFeynman, setLoadingFeynman] = useState(false);
        const [aiQuiz, setAiQuiz] = useState(null);
        const [loadingQuiz, setLoadingQuiz] = useState(false);
        const [userAnswers, setUserAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);

        const showAlert = (msg) => {
          setAlertMsg(msg);
          setTimeout(() => setAlertMsg(null), 3500);
        };

        const handleMarkNextStage = (logId) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const updatedStages = [...log.stages];
              const nextPendingIdx = updatedStages.findIndex(s => !s.completed);
              if (nextPendingIdx !== -1) {
                updatedStages[nextPendingIdx].completed = true;
                showAlert(`✅ स्टेज ${updatedStages[nextPendingIdx].name} पूर्ण! +20 XP`);
                setUser(u => ({ ...u, points: u.points + 20 }));
                return { ...log, stages: updatedStages };
              }
            }
            return log;
          }));
        };

        const handleResetRevisionCycle = (logId) => {
          setStudyLogs(prev => prev.map(log => {
            if (log.id === logId) {
              const today = new Date();
              const getDue = (days) => new Date(today.getTime() + days * 24*60*60*1000).toISOString().split('T')[0];
              showAlert("🔄 रिवीजन चक्र R1 से पुन: प्रारंभ!");
              return {
                ...log,
                stages: [
                  { name: 'R1 (24h)', due: getDue(1), completed: false },
                  { name: 'R2 (3d)', due: getDue(3), completed: false },
                  { name: 'R3 (7d)', due: getDue(7), completed: false },
                  { name: 'R4 (15d)', due: getDue(15), completed: false },
                  { name: 'Mastery', due: getDue(30), completed: false }
                ]
              };
            }
            return log;
          }));
        };

        const handleFeynmanVerify = async (log) => {
          const savedKey = localStorage.getItem('user_gemini_key');
          if (!savedKey) return showAlert("⚠️ प्रोफाइल में जाकर Gemini Key सेट करें!");
          if (!feynmanText.trim()) return;

          setLoadingFeynman(true);
          setFeynmanEvaluation('');

          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${savedKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: `Evaluate this student explanation for Topic "${log.topic}": "${feynmanText}". Point out mistakes briefly.` }] }]
              })
            });
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "AI विश्लेषण पूरा नहीं हुआ।";
            setFeynmanEvaluation(text);
            setUser(u => ({ ...u, points: u.points + 30 }));
          } catch (e) {
            setFeynmanEvaluation("❌ कनेक्शन त्रुटि। API Key जांचें।");
          } finally {
            setLoadingFeynman(false);
          }
        };

        const handleGenerateQuiz = async (log) => {
          const savedKey = localStorage.getItem('user_gemini_key');
          if (!savedKey) {
            setActiveTab('profile');
            return showAlert("⚠️ कृपया AI Key दर्ज करें!");
          }
          setAiQuiz(null);
          setUserAnswers({});
          setQuizSubmitted(false);
          setLoadingQuiz(true);
          setActiveTab('test-arena');

          try {
            const prompt = `Create a 3-question MCQ test on Subject: "${log.subject}" Topic: "${log.topic}". Format JSON strictly: {"questions": [{"question": "...", "options": ["a","b","c","d"], "correctIndex": 0, "explanation": "..."}]}`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${savedKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
              })
            });
            const data = await res.json();
            const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (resultText) {
              setAiQuiz(JSON.parse(resultText).questions);
            }
          } catch (e) {
            showAlert("⚠️ क्विज़ जनरेट नहीं हो सका।");
            setActiveTab('dashboard');
          } finally {
            setLoadingQuiz(false);
          }
        };

        const handleSubmitQuiz = () => {
          setQuizSubmitted(true);
          let correct = 0;
          if (aiQuiz) {
            aiQuiz.forEach((q, i) => { if (userAnswers[i] === q.correctIndex) correct++; });
          }
          setUser(u => ({ ...u, points: u.points + (correct * 20) }));
          showAlert(`🎉 स्कोर: ${correct}/3! +${correct * 20} XP`);
        };

        const handleAddLog = (e) => {
          e.preventDefault();
          const finalSub = newLog.subject === 'Custom' ? newLog.customSubject : newLog.subject;
          if (!finalSub || !newLog.topic) return;
          const today = new Date();
          const getDue = (days) => new Date(today.getTime() + days * 24*60*60*1000).toISOString().split('T')[0];

          const newEntry = {
            id: Date.now(),
            subject: finalSub,
            topic: newLog.topic,
            timeSpent: parseFloat(newLog.timeSpent) || 1,
            notes: '',
            stages: [
              { name: 'R1 (24h)', due: getDue(1), completed: false },
              { name: 'R2 (3d)', due: getDue(3), completed: false },
              { name: 'R3 (7d)', due: getDue(7), completed: false },
              { name: 'R4 (15d)', due: getDue(15), completed: false },
              { name: 'Mastery', due: getDue(30), completed: false }
            ]
          };

          setStudyLogs([newEntry, ...studyLogs]);
          setNewLog({ subject: '', customSubject: '', topic: '', timeSpent: 2 });
          setActiveTab('dashboard');
          showAlert("🚀 नया विषय दर्ज हो गया!");
        };

        useEffect(() => {
          let interval = null;
          if (timer.isActive) {
            interval = setInterval(() => {
              if (timer.seconds > 0) {
                setTimer(prev => ({ ...prev, seconds: prev.seconds - 1 }));
              } else if (timer.minutes > 0) {
                setTimer(prev => ({ ...prev, minutes: prev.minutes - 1, seconds: 59 }));
              } else {
                clearInterval(interval);
                setTimer({ minutes: 25, seconds: 0, isActive: false });
                showAlert("🔔 फोकस टाइमर समाप्त!");
              }
            }, 1000);
          } else { clearInterval(interval); }
          return () => clearInterval(interval);
        }, [timer.isActive, timer.seconds, timer.minutes]);

        const todayTotalAllocated = studyLogs.reduce((acc, log) => acc + (parseFloat(log.timeSpent) || 0), 0);
        const todayStr = new Date().toISOString().split('T')[0];

        return (
          <div className="min-h-screen flex flex-col justify-between items-center p-2 sm:p-4 w-full max-w-md mx-auto">
            
            {/* Header */}
            <header className="w-full flex justify-between items-center py-2 px-1 mb-2">
              <div>
                <h1 className="text-xl font-black text-indigo-500">🧠 {t[lang].title}</h1>
                <p className={`text-[9px] ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>{t[lang].subtitle}</p>
              </div>
              <div className="flex gap-2 shrink-0">
                <button 
                  onClick={() => setIsDarkMode(!isDarkMode)} 
                  className={`px-2.5 py-1 rounded-xl text-[10px] font-bold border transition ${isDarkMode ? 'bg-slate-900 border-slate-800 text-yellow-400' : 'bg-white border-slate-300 text-indigo-600 shadow-sm'}`}
                >
                  {isDarkMode ? '☀️ Light' : '🌙 Dark'}
                </button>
                <button 
                  onClick={() => setLang(lang === 'hi' ? 'en' : 'hi')} 
                  className="bg-indigo-600 text-white font-bold px-2.5 py-1 rounded-xl text-[10px] shadow-sm"
                >
                  🌐 {lang === 'hi' ? 'EN' : 'HI'}
                </button>
              </div>
            </header>

            {/* Main Window */}
            <div className={`w-full flex flex-col flex-1 rounded-[24px] border shadow-2xl relative overflow-hidden mb-16 min-h-[78vh] ${isDarkMode ? 'bg-slate-900 border-slate-800 text-slate-100' : 'bg-white border-slate-200 text-slate-900'}`}>
              
              {alertMsg && (
                <div className="absolute top-3 left-3 right-3 bg-indigo-600 text-white p-2.5 rounded-xl shadow-xl z-50 text-[11px] border border-indigo-400 animate-fadeIn text-center font-bold">
                  {alertMsg}
                </div>
              )}

              {/* Status Header Bar */}
              <div className={`text-[10px] px-4 py-2 flex justify-between items-center border-b ${isDarkMode ? 'bg-slate-950/80 border-slate-800/80 text-slate-400' : 'bg-slate-50 border-slate-200 text-slate-700'}`}>
                <div className="font-bold text-indigo-500">🏆 {t[lang].levelText} {Math.floor(user.points/200)+1}</div>
                <div className="flex items-center gap-2 font-semibold">
                  <span className={`px-2 py-0.5 rounded font-bold ${isDarkMode ? 'bg-indigo-950 text-indigo-400' : 'bg-indigo-100 text-indigo-700'}`}>🔥 {user.streak} {t[lang].streak}</span>
                  <span className={isDarkMode ? 'text-yellow-400' : 'text-yellow-600'}>⭐ {user.points} XP</span>
                </div>
              </div>

              {/* Dynamic Tab Body */}
              <main className="flex-1 overflow-y-auto p-3.5 space-y-4">
                
                {/* Dashboard Tab */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-4 animate-fadeIn">
                    
                    {/* Time Budget */}
                    <div className={`p-3.5 rounded-2xl border space-y-2 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                      <div className="flex justify-between items-center">
                        <h2 className="text-[10px] text-indigo-500 font-bold uppercase">{t[lang].budgetTitle}</h2>
                        <span className={`text-[11px] font-black ${isDarkMode ? 'text-slate-100' : 'text-slate-900'}`}>{todayTotalAllocated} / {user.availableHours} {t[lang].hoursBooked}</span>
                      </div>
                      <div className={`w-full h-2 rounded-full overflow-hidden ${isDarkMode ? 'bg-slate-800' : 'bg-slate-200'}`}>
                        <div className="bg-indigo-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (todayTotalAllocated / user.availableHours) * 100)}%` }}></div>
                      </div>
                    </div>

                    {/* Weekly Bar Chart */}
                    <div className={`p-3 rounded-2xl border space-y-2 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                      <h4 className="text-[11px] font-bold text-indigo-500">{t[lang].analyticsTitle}</h4>
                      <div className="flex justify-around items-end h-16 pt-1">
                        {[{d:"M",h:4},{d:"T",h:5.5},{d:"W",h:todayTotalAllocated||2,a:true},{d:"T",h:3},{d:"F",h:5},{d:"S",h:1},{d:"S",h:0}].map((b,i) => (
                          <div key={i} className="flex flex-col items-center flex-1 space-y-1">
                            <div className={`w-3 rounded-t transition-all ${b.a ? 'bg-indigo-500 shadow-sm' : (isDarkMode ? 'bg-slate-800' : 'bg-slate-300')}`} style={{ height: `${(b.h / 6) * 40}px` }}></div>
                            <span className={`text-[8px] font-bold ${isDarkMode ? 'text-slate-500' : 'text-slate-600'}`}>{b.d}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Filter Checkbox */}
                    <div className={`flex items-center gap-2 text-xs font-bold px-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>
                      <input 
                        type="checkbox" 
                        id="dueFilter" 
                        checked={showDueOnly} 
                        onChange={() => setShowDueOnly(!showDueOnly)} 
                        className="rounded w-4 h-4 accent-indigo-600 cursor-pointer" 
                      />
                      <label htmlFor="dueFilter" className="cursor-pointer select-none">{t[lang].dueOnly}</label>
                    </div>

                    {/* Tracker List */}
                    <div className="space-y-3">
                      <h3 className={`text-xs font-bold uppercase tracking-wider mb-1 ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>{t[lang].trackerTitle}</h3>
                      {studyLogs
                        .filter(log => !showDueOnly || log.stages.some(s => s.due === todayStr && !s.completed))
                        .map(log => (
                        
                        <div key={log.id} className={`p-3.5 rounded-2xl border space-y-3 shadow-sm ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                          
                          <div className="flex justify-between items-start gap-2">
                            <div className="flex-1">
                              <span className={`text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-wider border ${isDarkMode ? 'bg-indigo-950/80 text-indigo-300 border-indigo-800/60' : 'bg-indigo-100 text-indigo-800 border-indigo-300'}`}>
                                {log.subject}
                              </span>
                              <h4 className={`text-xs font-bold mt-1.5 leading-snug ${isDarkMode ? 'text-slate-100' : 'text-slate-900'}`}>
                                {log.topic}
                              </h4>
                            </div>
                          </div>

                          {/* Action Buttons */}
                          <div className="flex gap-1.5 flex-wrap pt-1">
                            <button 
                              type="button" 
                              onClick={() => { setActiveNotesLogId(activeNotesLogId === log.id ? null : log.id); setTempNotesText(log.notes || ''); }} 
                              className={`text-[9px] px-2.5 py-1.5 rounded-xl border font-bold transition ${isDarkMode ? 'bg-slate-800 text-slate-200 border-slate-700 hover:bg-slate-700' : 'bg-white text-slate-800 border-slate-300 hover:bg-slate-100'}`}
                            >
                              📝 Notes
                            </button>
                            <button 
                              type="button" 
                              onClick={() => { setActiveFeynmanLogId(activeFeynmanLogId === log.id ? null : log.id); setFeynmanText(''); setFeynmanEvaluation(''); }} 
                              className={`text-[9px] px-2.5 py-1.5 rounded-xl border font-bold transition ${isDarkMode ? 'bg-purple-950/60 text-purple-300 border-purple-800/60' : 'bg-purple-100 text-purple-900 border-purple-300'}`}
                            >
                              {t[lang].feynmanBtn}
                            </button>
                            <button 
                              type="button" 
                              onClick={() => handleGenerateQuiz(log)} 
                              className="bg-indigo-600 text-white text-[9px] px-2.5 py-1.5 rounded-xl font-bold transition shadow-sm hover:bg-indigo-700"
                            >
                              {t[lang].aiTestBtn}
                            </button>
                          </div>

                          {/* Feynman Active Recall Block */}
                          {activeFeynmanLogId === log.id && (
                            <div className={`p-3 rounded-xl border text-xs space-y-2 animate-fadeIn ${isDarkMode ? 'bg-purple-950/20 border-purple-900/40' : 'bg-purple-50 border-purple-200'}`}>
                              <textarea 
                                value={feynmanText} 
                                onChange={(e) => setFeynmanText(e.target.value)} 
                                placeholder={t[lang].feynmanPlaceholder} 
                                className={`w-full p-2 rounded-lg text-[11px] focus:outline-none h-16 resize-none border ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-purple-300 text-slate-800'}`} 
                              />
                              <button 
                                type="button" 
                                onClick={() => handleFeynmanVerify(log)} 
                                disabled={loadingFeynman} 
                                className="bg-purple-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold"
                              >
                                {loadingFeynman ? "विश्लेषण हो रहा है..." : t[lang].verifyFeynman}
                              </button>
                              {feynmanEvaluation && (
                                <div className={`p-2.5 rounded-lg border text-[10px] leading-relaxed ${isDarkMode ? 'bg-slate-950 border-purple-900/40 text-purple-200' : 'bg-white border-purple-200 text-purple-900'}`}>
                                  {feynmanEvaluation}
                                </div>
                              )}
                            </div>
                          )}

                          {/* Notes Inline Box */}
                          {activeNotesLogId === log.id && (
                            <div className={`p-3 rounded-xl border text-xs space-y-2 animate-fadeIn ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-slate-100 border-slate-300'}`}>
                              <textarea 
                                value={tempNotesText} 
                                onChange={(e) => setTempNotesText(e.target.value)} 
                                placeholder={t[lang].notesPlaceholder} 
                                className={`w-full p-2 rounded-lg text-[11px] focus:outline-none h-14 resize-none border ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white border-slate-300 text-slate-800'}`} 
                              />
                              <button 
                                type="button" 
                                onClick={() => {
                                  setStudyLogs(prev => prev.map(l => l.id === log.id ? { ...l, notes: tempNotesText } : l));
                                  setActiveNotesLogId(null);
                                  showAlert("📝 नोट्स सुरक्षित हुए!");
                                }} 
                                className="bg-emerald-600 text-white font-bold text-[10px] px-3 py-1.5 rounded-lg"
                              >
                                {t[lang].saveNotesBtn}
                              </button>
                            </div>
                          )}

                          {/* Display Notes */}
                          {log.notes && activeNotesLogId !== log.id && (
                            <div className={`text-[10px] font-medium p-2 rounded-lg border ${isDarkMode ? 'bg-slate-900/60 border-slate-800 text-slate-300' : 'bg-white border-slate-200 text-slate-700'}`}>
                              📌 {log.notes}
                            </div>
                          )}

                          {/* 5-Stage Repetition Pillars */}
                          <div className="grid grid-cols-5 gap-1 pt-1">
                            {log.stages.map((stage, idx) => (
                              <div 
                                key={idx} 
                                className={`text-[8px] py-1.5 rounded-lg border text-center font-bold transition ${
                                  stage.completed 
                                    ? (isDarkMode ? 'bg-emerald-950/80 border-emerald-700 text-emerald-300' : 'bg-emerald-100 border-emerald-400 text-emerald-900') 
                                    : (isDarkMode ? 'bg-slate-900 border-slate-800 text-slate-400' : 'bg-slate-200 border-slate-300 text-slate-700')
                                }`}
                              >
                                {stage.name}
                              </div>
                            ))}
                          </div>

                          {/* Controls */}
                          <div className={`flex gap-2 pt-2 border-t ${isDarkMode ? 'border-slate-800' : 'border-slate-200'}`}>
                            <button 
                              type="button" 
                              onClick={() => handleMarkNextStage(log.id)} 
                              className={`flex-1 border text-[10px] py-1.5 rounded-xl font-bold transition ${isDarkMode ? 'bg-emerald-950/40 border-emerald-800/80 text-emerald-300 hover:bg-emerald-900/50' : 'bg-emerald-50 border-emerald-300 text-emerald-800 hover:bg-emerald-100'}`}
                            >
                              ✅ {lang === 'hi' ? 'अगला स्टेज पूर्ण' : 'Stage Done'}
                            </button>
                            <button 
                              type="button" 
                              onClick={() => handleResetRevisionCycle(log.id)} 
                              className={`flex-1 border text-[10px] py-1.5 rounded-xl font-bold transition ${isDarkMode ? 'bg-rose-950/40 border-rose-800/80 text-rose-300 hover:bg-rose-900/50' : 'bg-rose-50 border-rose-300 text-rose-800 hover:bg-rose-100'}`}
                            >
                              {t[lang].resetCycle}
                            </button>
                          </div>

                        </div>
                      ))}
                    </div>

                  </div>
                )}

                {/* Add Log Tab */}
                {activeTab === 'log' && (
                  <form onSubmit={handleAddLog} className="space-y-4 text-xs animate-fadeIn">
                    <h3 className="font-bold text-sm text-indigo-500 mb-2">{t[lang].addLogTitle}</h3>
                    <div>
                      <label className={`block font-bold mb-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].labelSubject}</label>
                      <select 
                        value={newLog.subject} 
                        onChange={(e) => setNewLog({ ...newLog, subject: e.target.value })} 
                        className={`w-full border rounded-xl p-2.5 font-semibold ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-white border-slate-300 text-slate-900'}`}
                      >
                        <option value="">{t[lang].selectOpt}</option>
                        <option value="Physics">Physics</option>
                        <option value="Maths">Maths</option>
                        <option value="History">History</option>
                        <option value="Custom">Custom</option>
                      </select>
                    </div>
                    {newLog.subject === 'Custom' && (
                      <input 
                        type="text" 
                        placeholder="Subject name" 
                        value={newLog.customSubject} 
                        onChange={(e) => setNewLog({ ...newLog, customSubject: e.target.value })} 
                        className={`w-full border rounded-xl p-2.5 font-semibold ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-white border-slate-300 text-slate-900'}`} 
                      />
                    )}
                    <div>
                      <label className={`block font-bold mb-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].labelTopic}</label>
                      <input 
                        type="text" 
                        placeholder="Topic name" 
                        value={newLog.topic} 
                        onChange={(e) => setNewLog({ ...newLog, topic: e.target.value })} 
                        className={`w-full border rounded-xl p-2.5 font-semibold ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-white border-slate-300 text-slate-900'}`} 
                      />
                    </div>
                    <div>
                      <label className={`block font-bold mb-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].labelTime}</label>
                      <input 
                        type="number" 
                        step="0.5" 
                        min="0.5" 
                        value={newLog.timeSpent} 
                        onChange={(e) => setNewLog({ ...newLog, timeSpent: e.target.value })} 
                        className={`w-full border rounded-xl p-2.5 font-semibold ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-white border-slate-300 text-slate-900'}`} 
                      />
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 font-bold py-3 rounded-xl text-white hover:bg-indigo-700 transition">{t[lang].btnSave}</button>
                  </form>
                )}

                {/* AI Test Arena Tab */}
                {activeTab === 'test-arena' && (
                  <div className="space-y-4 animate-fadeIn">
                    {loadingQuiz ? (
                      <div className="text-center py-12">
                        <div className="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                        <p className="text-xs text-slate-400 font-bold">Gemini AI Test तैयार कर रहा है...</p>
                      </div>
                    ) : aiQuiz ? (
                      <div className="space-y-4 text-xs">
                        {aiQuiz.map((q, qIdx) => (
                          <div key={qIdx} className={`p-3.5 rounded-xl border space-y-2.5 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                            <h4 className="font-bold leading-relaxed text-sm">{qIdx + 1}. {q.question}</h4>
                            <div className="space-y-1.5">
                              {q.options.map((opt, oIdx) => (
                                <button 
                                  key={oIdx} 
                                  type="button" 
                                  onClick={() => setUserAnswers({ ...userAnswers, [qIdx]: oIdx })} 
                                  className={`w-full text-left p-2.5 rounded-lg border text-[11px] font-medium transition ${userAnswers[qIdx] === oIdx ? 'ring-2 ring-indigo-500 border-indigo-500 bg-indigo-500/10' : (isDarkMode ? 'border-slate-800 bg-slate-900' : 'border-slate-300 bg-white')}`}
                                >
                                  {opt}
                                </button>
                              ))}
                            </div>
                            {quizSubmitted && (
                              <div className={`text-[10px] p-2 rounded leading-normal mt-2 border ${isDarkMode ? 'bg-slate-900 border-slate-800 text-slate-300' : 'bg-white border-slate-200 text-slate-700'}`}>
                                💡 {q.explanation}
                              </div>
                            )}
                          </div>
                        ))}
                        <button onClick={handleSubmitQuiz} className="w-full bg-emerald-600 font-bold py-2.5 rounded-xl text-white">सबमिट करें</button>
                      </div>
                    ) : null}
                  </div>
                )}

                {/* Focus Timer Tab */}
                {activeTab === 'timer' && (
                  <div className="space-y-6 flex flex-col items-center justify-center min-h-[300px] animate-fadeIn">
                    <div className="w-full flex items-center justify-between text-xs px-2">
                      <span className={`font-bold ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>{t[lang].customTimerLabel}</span>
                      <input 
                        type="number" 
                        value={timer.minutes} 
                        onChange={(e) => setTimer(prev => ({ ...prev, minutes: parseInt(e.target.value) || 25 }))} 
                        className={`w-16 p-1.5 border rounded-lg text-center font-bold ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-white border-slate-300 text-slate-900'}`} 
                      />
                    </div>
                    <div className={`text-5xl font-black font-mono tracking-wider px-8 py-4 rounded-2xl border ${isDarkMode ? 'text-indigo-400 bg-slate-950 border-slate-800' : 'text-indigo-600 bg-slate-50 border-slate-200'}`}>
                      {String(timer.minutes).padStart(2, '0')}:{String(timer.seconds).padStart(2, '0')}
                    </div>
                    <button 
                      type="button" 
                      onClick={() => setTimer(prev => ({ ...prev, isActive: !prev.isActive }))} 
                      className="px-10 py-3 rounded-xl bg-indigo-600 font-bold text-white shadow-md hover:bg-indigo-700"
                    >
                      {timer.isActive ? t[lang].btnPause : t[lang].btnStart}
                    </button>
                  </div>
                )}

                {/* Profile Tab */}
                {activeTab === 'profile' && (
                  <div className="space-y-4 text-xs animate-fadeIn">
                    <div className={`rounded-2xl p-4 border space-y-3 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                      <h4 className="text-[11px] font-bold text-indigo-500 uppercase">{t[lang].aiSettings}</h4>
                      <input 
                        type="password" 
                        placeholder="Gemini API Key..." 
                        value={inputApiKey} 
                        onChange={(e) => setInputApiKey(e.target.value)} 
                        className={`w-full border p-2.5 rounded-xl focus:outline-none text-[11px] font-medium ${isDarkMode ? 'bg-slate-900 border-slate-800 text-slate-100' : 'bg-white border-slate-300 text-slate-900'}`} 
                      />
                      <button 
                        type="button" 
                        onClick={() => { localStorage.setItem('user_gemini_key', inputApiKey); showAlert("✅ AI Key सुरक्षित सेव हो गई!"); }} 
                        className="w-full bg-indigo-600 font-bold py-2.5 rounded-xl text-white"
                      >
                        {t[lang].btnSaveKey}
                      </button>
                    </div>

                    <div className={`rounded-2xl p-4 border space-y-3 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                      <h4 className="text-[11px] font-bold text-indigo-500 uppercase">{t[lang].backupTitle}</h4>
                      <div className="grid grid-cols-2 gap-2">
                        <button 
                          type="button" 
                          onClick={() => {
                            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(studyLogs));
                            const dlAnchor = document.createElement('a');
                            dlAnchor.setAttribute("href", dataStr);
                            dlAnchor.setAttribute("download", `sajag_backup.json`);
                            dlAnchor.click();
                          }} 
                          className="bg-indigo-600 text-white py-2.5 rounded-xl font-bold text-[10px]"
                        >
                          {t[lang].btnExport}
                        </button>
                        <label className={`py-2.5 rounded-xl font-bold text-center cursor-pointer border text-[10px] ${isDarkMode ? 'bg-slate-800 text-slate-200 border-slate-700' : 'bg-white text-slate-800 border-slate-300'}`}>
                          {t[lang].btnImport}
                          <input 
                            type="file" 
                            accept=".json" 
                            onChange={(e) => {
                              const reader = new FileReader();
                              if (e.target.files[0]) {
                                reader.readAsText(e.target.files[0], "UTF-8");
                                reader.onload = (evt) => {
                                  try {
                                    setStudyLogs(JSON.parse(evt.target.result));
                                    showAlert("📥 डेटा रीस्टोर हो गया!");
                                  } catch (err) { showAlert("⚠️ अमान्य फ़ाइल"); }
                                };
                              }
                            }} 
                            className="hidden" 
                          />
                        </label>
                      </div>
                    </div>
                  </div>
                )}

              </main>

              {/* Bottom Mobile Dock Navbar */}
              <nav className={`absolute bottom-0 left-0 right-0 h-14 border-t flex justify-around items-center px-1 z-20 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                <button type="button" onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'dashboard' ? 'text-indigo-500 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-600')}`}><span className="text-base">📖</span><span className="text-[8px] mt-0.5">{t[lang].navTracker}</span></button>
                <button type="button" onClick={() => setActiveTab('log')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'log' ? 'text-indigo-500 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-600')}`}><span className="text-base">➕</span><span className="text-[8px] mt-0.5">{t[lang].navAdd}</span></button>
                <button type="button" onClick={() => setActiveTab('timer')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'timer' ? 'text-indigo-500 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-600')}`}><span className="text-base">⏱</span><span className="text-[8px] mt-0.5">{t[lang].navFocus}</span></button>
                <button type="button" onClick={() => setActiveTab('profile')} className={`flex flex-col items-center flex-1 py-1 ${activeTab === 'profile' ? 'text-indigo-500 font-bold' : (isDarkMode ? 'text-slate-500' : 'text-slate-600')}`}><span className="text-base">⚙️</span><span className="text-[8px] mt-0.5">{t[lang].navProfile}</span></button>
              </nav>

            </div>

            <footer className={`w-full text-center py-0.5 text-[9px] font-bold ${isDarkMode ? 'text-slate-600' : 'text-slate-500'}`}>app.pmevidya.com</footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
